openapi: 3.1.0
info:
  title: Task Management API
  version: 1.0.0
  description: >
    HTTP API for a team/project task-management application built with Laravel.
    Provides authentication, teams, projects, project & team members, labels,
    tasks (with subtasks, comments, attachments, activity), notifications,
    dashboard and search. All authenticated endpoints expect a bearer token
    obtained from register/login.
servers:
  - url: /api
    description: API root (routes are registered under the /api prefix)
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Users
  - name: Teams
  - name: Team Members
  - name: Projects
  - name: Project Members
  - name: Labels
  - name: Tasks
  - name: Comments
  - name: Attachments
  - name: Notifications
  - name: Activity
  - name: Dashboard
  - name: Search
  - name: Health

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in and obtain an API token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /auth/logout:
    post:
      tags: [Auth]
      summary: Log out (revoke the current API token)
      responses:
        "204":
          description: Logged out
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/me:
    get:
      tags: [Auth]
      summary: Get the authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/profile:
    patch:
      tags: [Auth]
      summary: Update the authenticated user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /auth/password:
    post:
      tags: [Auth]
      summary: Change the authenticated user's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "204":
          description: Password changed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /users:
    get:
      tags: [Users]
      summary: List users
      parameters:
        - name: q
          in: query
          description: Search by name or email
          schema:
            type: string
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Page"
      responses:
        "200":
          description: Paginated users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserCollection"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/{user}:
    parameters:
      - $ref: "#/components/parameters/UserId"
    get:
      tags: [Users]
      summary: Get a user
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Users]
      summary: Update a user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [Users]
      summary: Delete a user (admin only)
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /teams:
    get:
      tags: [Teams]
      summary: List the authenticated user's teams
      parameters:
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Page"
      responses:
        "200":
          description: Paginated teams
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamCollection"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Teams]
      summary: Create a team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreTeamRequest"
      responses:
        "201":
          description: Created team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /teams/{team}:
    parameters:
      - $ref: "#/components/parameters/TeamId"
    get:
      tags: [Teams]
      summary: Get a team
      responses:
        "200":
          description: Team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Teams]
      summary: Update a team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTeamRequest"
      responses:
        "200":
          description: Updated team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [Teams]
      summary: Delete a team
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /teams/{team}/members:
    parameters:
      - $ref: "#/components/parameters/TeamId"
    get:
      tags: [Team Members]
      summary: List team members
      responses:
        "200":
          description: Team members
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TeamMember"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Team Members]
      summary: Invite/add a member to a team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteTeamMemberRequest"
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMemberEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /teams/{team}/members/{user}:
    parameters:
      - $ref: "#/components/parameters/TeamId"
      - $ref: "#/components/parameters/UserId"
    patch:
      tags: [Team Members]
      summary: Update a team member's role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTeamMemberRequest"
      responses:
        "200":
          description: Updated member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMemberEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [Team Members]
      summary: Remove a team member
      responses:
        "204":
          description: Removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /teams/{team}/projects:
    parameters:
      - $ref: "#/components/parameters/TeamId"
    get:
      tags: [Projects]
      summary: List projects in a team
      parameters:
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Page"
      responses:
        "200":
          description: Paginated projects
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectCollection"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Projects]
      summary: Create a project in a team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreProjectRequest"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /projects/{project}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags: [Projects]
      summary: Get a project
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Projects]
      summary: Update a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [Projects]
      summary: Delete a project
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /projects/{project}/archive:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    post:
      tags: [Projects]
      summary: Archive a project
      responses:
        "200":
          description: Archived project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /projects/{project}/restore:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    post:
      tags: [Projects]
      summary: Restore an archived project
      responses:
        "200":
          description: Restored project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /projects/{project}/stats:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags: [Projects]
      summary: Get project statistics
      responses:
        "200":
          description: Project stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ProjectStats"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /projects/{project}/members:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags: [Project Members]
      summary: List project members
      responses:
        "200":
          description: Project members
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProjectMember"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Project Members]
      summary: Add a member to a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreProjectMemberRequest"
      responses:
        "201":
          description: Member added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMemberEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /projects/{project}/members/{user}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/UserId"
    patch:
      tags: [Project Members]
      summary: Update a project member's role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectMemberRequest"
      responses:
        "200":
          description: Updated member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMemberEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [Project Members]
      summary: Remove a project member
      responses:
        "204":
          description: Removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /projects/{project}/activity:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags: [Activity]
      summary: List activity logs for a project
      parameters:
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Page"
      responses:
        "200":
          description: Paginated activity logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityLogCollection"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /projects/{project}/labels:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags: [Labels]
      summary: List labels for a project
      responses:
        "200":
          description: Labels
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Label"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Labels]
      summary: Create a label in a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreLabelRequest"
      responses:
        "201":
          description: Created label
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LabelEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /labels/{label}:
    parameters:
      - $ref: "#/components/parameters/LabelId"
    patch:
      tags: [Labels]
      summary: Update a label
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLabelRequest"
      responses:
        "200":
          description: Updated label
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LabelEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [Labels]
      summary: Delete a label
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /projects/{project}/tasks:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags: [Tasks]
      summary: List tasks in a project
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/TaskStatus"
        - name: priority
          in: query
          schema:
            $ref: "#/components/schemas/TaskPriority"
        - name: assignee_id
          in: query
          schema:
            type: integer
        - name: label_id
          in: query
          schema:
            type: integer
        - name: due_before
          in: query
          schema:
            type: string
            format: date
        - name: due_after
          in: query
          schema:
            type: string
            format: date
        - name: q
          in: query
          description: Search task title/description
          schema:
            type: string
        - name: overdue
          in: query
          schema:
            type: boolean
        - name: parent_id
          in: query
          schema:
            type: integer
        - name: root
          in: query
          description: Only top-level tasks (no parent)
          schema:
            type: boolean
        - name: sort
          in: query
          schema:
            type: string
            enum: [created_at, due_date, priority, position, title]
            default: position
        - name: dir
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Page"
      responses:
        "200":
          description: Paginated tasks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskListCollection"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
    post:
      tags: [Tasks]
      summary: Create a task in a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreTaskRequest"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /tasks/{task}:
    parameters:
      - $ref: "#/components/parameters/TaskId"
    get:
      tags: [Tasks]
      summary: Get a task
      responses:
        "200":
          description: Task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Tasks]
      summary: Update a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskRequest"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [Tasks]
      summary: Delete a task
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /tasks/{task}/assign:
    parameters:
      - $ref: "#/components/parameters/TaskId"
    post:
      tags: [Tasks]
      summary: Assign a task to a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignTaskRequest"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /tasks/{task}/unassign:
    parameters:
      - $ref: "#/components/parameters/TaskId"
    post:
      tags: [Tasks]
      summary: Unassign a task
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /tasks/{task}/status:
    parameters:
      - $ref: "#/components/parameters/TaskId"
    post:
      tags: [Tasks]
      summary: Transition a task to a new status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransitionStatusRequest"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /tasks/{task}/priority:
    parameters:
      - $ref: "#/components/parameters/TaskId"
    post:
      tags: [Tasks]
      summary: Update a task's priority
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePriorityRequest"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /tasks/{task}/labels:
    parameters:
      - $ref: "#/components/parameters/TaskId"
    post:
      tags: [Tasks]
      summary: Sync the labels on a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncLabelsRequest"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /tasks/{task}/subtasks:
    parameters:
      - $ref: "#/components/parameters/TaskId"
    get:
      tags: [Tasks]
      summary: List subtasks of a task
      responses:
        "200":
          description: Subtasks
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TaskListItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Tasks]
      summary: Create a subtask under a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreTaskRequest"
      responses:
        "201":
          description: Created subtask
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /tasks/{task}/reorder:
    parameters:
      - $ref: "#/components/parameters/TaskId"
    post:
      tags: [Tasks]
      summary: Reorder a task (set its position)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderTaskRequest"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /tasks/{task}/activity:
    parameters:
      - $ref: "#/components/parameters/TaskId"
    get:
      tags: [Activity]
      summary: List activity logs for a task
      parameters:
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Page"
      responses:
        "200":
          description: Paginated activity logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityLogCollection"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /tasks/{task}/comments:
    parameters:
      - $ref: "#/components/parameters/TaskId"
    get:
      tags: [Comments]
      summary: List comments on a task
      parameters:
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Page"
      responses:
        "200":
          description: Paginated comments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentCollection"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Comments]
      summary: Add a comment to a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreCommentRequest"
      responses:
        "201":
          description: Created comment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /comments/{comment}:
    parameters:
      - $ref: "#/components/parameters/CommentId"
    patch:
      tags: [Comments]
      summary: Update a comment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCommentRequest"
      responses:
        "200":
          description: Updated comment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [Comments]
      summary: Delete a comment
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /tasks/{task}/attachments:
    parameters:
      - $ref: "#/components/parameters/TaskId"
    get:
      tags: [Attachments]
      summary: List attachments on a task
      parameters:
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Page"
      responses:
        "200":
          description: Paginated attachments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachmentCollection"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Attachments]
      summary: Upload an attachment to a task
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: "File to upload (max 20480 KB)"
      responses:
        "201":
          description: Created attachment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachmentEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /attachments/{attachment}/download:
    parameters:
      - $ref: "#/components/parameters/AttachmentId"
    get:
      tags: [Attachments]
      summary: Download an attachment
      responses:
        "200":
          description: File contents
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /attachments/{attachment}:
    parameters:
      - $ref: "#/components/parameters/AttachmentId"
    delete:
      tags: [Attachments]
      summary: Delete an attachment
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /notifications:
    get:
      tags: [Notifications]
      summary: List the authenticated user's notifications
      parameters:
        - name: unread
          in: query
          description: Only return unread notifications
          schema:
            type: boolean
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Page"
      responses:
        "200":
          description: Paginated notifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationCollection"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /notifications/read-all:
    post:
      tags: [Notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: Count of notifications updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"

  /notifications/{notification}/read:
    parameters:
      - $ref: "#/components/parameters/NotificationId"
    post:
      tags: [Notifications]
      summary: Mark a notification as read
      responses:
        "200":
          description: Updated notification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /notifications/{notification}:
    parameters:
      - $ref: "#/components/parameters/NotificationId"
    delete:
      tags: [Notifications]
      summary: Delete a notification
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /activity:
    get:
      tags: [Activity]
      summary: List activity logs visible to the authenticated user
      parameters:
        - name: team_id
          in: query
          schema:
            type: integer
        - name: project_id
          in: query
          schema:
            type: integer
        - name: causer_id
          in: query
          schema:
            type: integer
        - name: action
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Page"
      responses:
        "200":
          description: Paginated activity logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityLogCollection"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /dashboard:
    get:
      tags: [Dashboard]
      summary: Get the authenticated user's dashboard
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dashboard"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /search:
    get:
      tags: [Search]
      summary: Search projects, tasks and comments
      parameters:
        - name: q
          in: query
          required: true
          description: "Search query (2-255 chars)"
          schema:
            type: string
            minLength: 2
            maxLength: 255
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: "API token returned from register/login. Send as: Authorization: Bearer <token>"

  parameters:
    PerPage:
      name: per_page
      in: query
      description: Items per page (1-100, default 20)
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Page:
      name: page
      in: query
      description: Page number for pagination
      schema:
        type: integer
        minimum: 1
    UserId:
      name: user
      in: path
      required: true
      schema:
        type: integer
    TeamId:
      name: team
      in: path
      required: true
      schema:
        type: integer
    ProjectId:
      name: project
      in: path
      required: true
      schema:
        type: integer
    TaskId:
      name: task
      in: path
      required: true
      schema:
        type: integer
    LabelId:
      name: label
      in: path
      required: true
      schema:
        type: integer
    CommentId:
      name: comment
      in: path
      required: true
      schema:
        type: integer
    AttachmentId:
      name: attachment
      in: path
      required: true
      schema:
        type: integer
    NotificationId:
      name: notification
      in: path
      required: true
      schema:
        type: integer

  responses:
    Unauthorized:
      description: Authentication required or token invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageError"
    Forbidden:
      description: The action is forbidden for the current user
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageError"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageError"
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationError"

  schemas:
    MessageError:
      type: object
      properties:
        message:
          type: string

    ValidationError:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
        from:
          type: [integer, "null"]
        last_page:
          type: integer
        per_page:
          type: integer
        to:
          type: [integer, "null"]
        total:
          type: integer
        path:
          type: string

    PaginationLinks:
      type: object
      properties:
        first:
          type: [string, "null"]
        last:
          type: [string, "null"]
        prev:
          type: [string, "null"]
        next:
          type: [string, "null"]

    TaskStatus:
      type: string
      enum: [todo, in_progress, in_review, done, cancelled]

    TaskPriority:
      type: string
      enum: [low, medium, high, urgent]

    TeamRole:
      type: string
      enum: [owner, admin, member]

    ProjectRole:
      type: string
      enum: [lead, contributor, viewer]

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          description: Only present to the user themselves or to admins
        role:
          type: string
          enum: [admin, member]
        avatar_url:
          type: [string, "null"]
        timezone:
          type: [string, "null"]
        created_at:
          type: [string, "null"]
          format: date-time

    UserEnvelope:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/User"

    UserCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
        links:
          $ref: "#/components/schemas/PaginationLinks"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
          description: API bearer token

    Team:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: [string, "null"]
        owner_id:
          type: integer
        owner:
          $ref: "#/components/schemas/User"
        members_count:
          type: integer
        projects_count:
          type: integer
        created_at:
          type: [string, "null"]
          format: date-time
        updated_at:
          type: [string, "null"]
          format: date-time

    TeamEnvelope:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Team"

    TeamCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Team"
        links:
          $ref: "#/components/schemas/PaginationLinks"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    TeamMember:
      type: object
      properties:
        id:
          type: integer
        team_id:
          type: [integer, "null"]
        user_id:
          type: [integer, "null"]
        role:
          $ref: "#/components/schemas/TeamRole"
        user:
          $ref: "#/components/schemas/User"
        created_at:
          type: [string, "null"]
          format: date-time
        updated_at:
          type: [string, "null"]
          format: date-time

    TeamMemberEnvelope:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/TeamMember"

    Project:
      type: object
      properties:
        id:
          type: integer
        team_id:
          type: integer
        name:
          type: string
        key:
          type: string
        description:
          type: [string, "null"]
        status:
          type: string
          enum: [active, archived]
        color:
          type: [string, "null"]
        created_by:
          type: [integer, "null"]
        team:
          $ref: "#/components/schemas/Team"
        creator:
          $ref: "#/components/schemas/User"
        members_count:
          type: integer
        tasks_count:
          type: integer
        created_at:
          type: [string, "null"]
          format: date-time
        updated_at:
          type: [string, "null"]
          format: date-time

    ProjectEnvelope:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Project"

    ProjectCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Project"
        links:
          $ref: "#/components/schemas/PaginationLinks"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    ProjectMember:
      type: object
      properties:
        id:
          type: integer
        project_id:
          type: [integer, "null"]
        user_id:
          type: [integer, "null"]
        role:
          $ref: "#/components/schemas/ProjectRole"
        user:
          $ref: "#/components/schemas/User"
        created_at:
          type: [string, "null"]
          format: date-time
        updated_at:
          type: [string, "null"]
          format: date-time

    ProjectMemberEnvelope:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/ProjectMember"

    ProjectStats:
      type: object
      description: Aggregated statistics for a project
      properties:
        tasks_total:
          type: integer
        tasks_by_status:
          type: object
          additionalProperties:
            type: integer
        tasks_by_priority:
          type: object
          additionalProperties:
            type: integer
        completed:
          type: integer
        overdue:
          type: integer
        completion_pct:
          type: number
        members:
          type: integer

    Label:
      type: object
      properties:
        id:
          type: integer
        project_id:
          type: integer
        name:
          type: string
        color:
          type: string
        created_at:
          type: [string, "null"]
          format: date-time
        updated_at:
          type: [string, "null"]
          format: date-time

    LabelEnvelope:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Label"

    Task:
      type: object
      properties:
        id:
          type: integer
        project_id:
          type: integer
        parent_id:
          type: [integer, "null"]
        title:
          type: string
        description:
          type: [string, "null"]
        status:
          $ref: "#/components/schemas/TaskStatus"
        priority:
          $ref: "#/components/schemas/TaskPriority"
        assignee_id:
          type: [integer, "null"]
        reporter_id:
          type: [integer, "null"]
        assignee:
          $ref: "#/components/schemas/User"
        reporter:
          $ref: "#/components/schemas/User"
        labels:
          type: array
          items:
            $ref: "#/components/schemas/Label"
        due_date:
          type: [string, "null"]
          format: date-time
        completed_at:
          type: [string, "null"]
          format: date-time
        position:
          type: integer
        is_overdue:
          type: boolean
        comments_count:
          type: integer
        attachments_count:
          type: integer
        subtasks_count:
          type: integer
        created_at:
          type: [string, "null"]
          format: date-time
        updated_at:
          type: [string, "null"]
          format: date-time

    TaskEnvelope:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Task"

    TaskListItem:
      type: object
      description: Lighter task representation (omits description)
      properties:
        id:
          type: integer
        project_id:
          type: integer
        parent_id:
          type: [integer, "null"]
        title:
          type: string
        status:
          $ref: "#/components/schemas/TaskStatus"
        priority:
          $ref: "#/components/schemas/TaskPriority"
        assignee_id:
          type: [integer, "null"]
        reporter_id:
          type: [integer, "null"]
        assignee:
          $ref: "#/components/schemas/User"
        reporter:
          $ref: "#/components/schemas/User"
        labels:
          type: array
          items:
            $ref: "#/components/schemas/Label"
        due_date:
          type: [string, "null"]
          format: date-time
        completed_at:
          type: [string, "null"]
          format: date-time
        position:
          type: integer
        is_overdue:
          type: boolean
        comments_count:
          type: integer
        attachments_count:
          type: integer
        subtasks_count:
          type: integer
        created_at:
          type: [string, "null"]
          format: date-time
        updated_at:
          type: [string, "null"]
          format: date-time

    TaskListCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/TaskListItem"
        links:
          $ref: "#/components/schemas/PaginationLinks"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    Comment:
      type: object
      properties:
        id:
          type: integer
        task_id:
          type: integer
        user_id:
          type: integer
        user:
          $ref: "#/components/schemas/User"
        body:
          type: string
        edited_at:
          type: [string, "null"]
          format: date-time
        created_at:
          type: [string, "null"]
          format: date-time
        updated_at:
          type: [string, "null"]
          format: date-time

    CommentEnvelope:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Comment"

    CommentCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Comment"
        links:
          $ref: "#/components/schemas/PaginationLinks"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    Attachment:
      type: object
      properties:
        id:
          type: integer
        task_id:
          type: integer
        original_name:
          type: string
        mime:
          type: string
        size:
          type: integer
        uploaded_by:
          type: integer
        uploader:
          $ref: "#/components/schemas/User"
        download_url:
          type: string
        created_at:
          type: [string, "null"]
          format: date-time

    AttachmentEnvelope:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Attachment"

    AttachmentCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Attachment"
        links:
          $ref: "#/components/schemas/PaginationLinks"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    Notification:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        data:
          type: [object, "null"]
          additionalProperties: true
        read_at:
          type: [string, "null"]
          format: date-time
        created_at:
          type: [string, "null"]
          format: date-time

    NotificationEnvelope:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Notification"

    NotificationCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Notification"
        links:
          $ref: "#/components/schemas/PaginationLinks"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    ActivityLog:
      type: object
      properties:
        id:
          type: integer
        action:
          type: string
        causer_id:
          type: [integer, "null"]
        causer:
          $ref: "#/components/schemas/User"
        subject_type:
          type: [string, "null"]
        subject_id:
          type: [integer, "null"]
        properties:
          type: [object, "null"]
          additionalProperties: true
        project_id:
          type: [integer, "null"]
        team_id:
          type: [integer, "null"]
        created_at:
          type: [string, "null"]
          format: date-time

    ActivityLogCollection:
      type: object
      properties:
        data:
