openapi: 3.1.0
info:
  title: Project Management API
  version: 1.0.0
  description: REST API for a project management application with teams, projects, tasks, comments, attachments, labels, and notifications.

servers:
  - url: /api
    description: API base path

security:
  - tokenAuth: []

components:
  securitySchemes:
    tokenAuth:
      type: apiKey
      in: header
      name: Authorization
      description: Bearer token — pass as `Bearer {token}`

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
          description: Only visible to the user themselves or admins
        role:
          type: string
          enum: [admin, member]
        avatar_url:
          type: string
          nullable: true
        timezone:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    Team:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        owner_id:
          type: integer
        owner:
          $ref: '#/components/schemas/User'
        members_count:
          type: integer
        projects_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TeamMember:
      type: object
      properties:
        id:
          type: integer
        team_id:
          type: integer
        user_id:
          type: integer
        role:
          type: string
          enum: [owner, admin, member]
        user:
          $ref: '#/components/schemas/User'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Project:
      type: object
      properties:
        id:
          type: integer
        team_id:
          type: integer
        name:
          type: string
        key:
          type: string
          description: Uppercase alphanumeric project key, unique per team
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, archived]
        color:
          type: string
          nullable: true
        created_by:
          type: integer
        team:
          $ref: '#/components/schemas/Team'
        creator:
          $ref: '#/components/schemas/User'
        members_count:
          type: integer
        tasks_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ProjectMember:
      type: object
      properties:
        id:
          type: integer
        project_id:
          type: integer
        user_id:
          type: integer
        role:
          type: string
          enum: [lead, contributor, viewer]
        user:
          $ref: '#/components/schemas/User'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Label:
      type: object
      properties:
        id:
          type: integer
        project_id:
          type: integer
        name:
          type: string
        color:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Task:
      type: object
      properties:
        id:
          type: integer
        project_id:
          type: integer
        parent_id:
          type: integer
          nullable: true
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [todo, in_progress, in_review, done, cancelled]
        priority:
          type: string
          enum: [low, medium, high, urgent]
        assignee_id:
          type: integer
          nullable: true
        reporter_id:
          type: integer
          nullable: true
        assignee:
          $ref: '#/components/schemas/User'
        reporter:
          $ref: '#/components/schemas/User'
        labels:
          type: array
          items:
            $ref: '#/components/schemas/Label'
        due_date:
          type: string
          format: date
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        position:
          type: integer
        is_overdue:
          type: boolean
        comments_count:
          type: integer
        attachments_count:
          type: integer
        subtasks_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TaskList:
      type: object
      description: Lightweight task representation — omits description field
      properties:
        id:
          type: integer
        project_id:
          type: integer
        parent_id:
          type: integer
          nullable: true
        title:
          type: string
        status:
          type: string
          enum: [todo, in_progress, in_review, done, cancelled]
        priority:
          type: string
          enum: [low, medium, high, urgent]
        assignee_id:
          type: integer
          nullable: true
        reporter_id:
          type: integer
          nullable: true
        assignee:
          $ref: '#/components/schemas/User'
        reporter:
          $ref: '#/components/schemas/User'
        labels:
          type: array
          items:
            $ref: '#/components/schemas/Label'
        due_date:
          type: string
          format: date
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        position:
          type: integer
        is_overdue:
          type: boolean
        comments_count:
          type: integer
        attachments_count:
          type: integer
        subtasks_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Comment:
      type: object
      properties:
        id:
          type: integer
        task_id:
          type: integer
        user_id:
          type: integer
        user:
          $ref: '#/components/schemas/User'
        body:
          type: string
        edited_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Attachment:
      type: object
      properties:
        id:
          type: integer
        task_id:
          type: integer
        original_name:
          type: string
        mime:
          type: string
        size:
          type: integer
          description: File size in bytes
        uploaded_by:
          type: integer
        uploader:
          $ref: '#/components/schemas/User'
        download_url:
          type: string
          format: uri
        created_at:
          type: string
          format: date-time

    ActivityLog:
      type: object
      properties:
        id:
          type: integer
        action:
          type: string
        causer_id:
          type: integer
          nullable: true
        causer:
          $ref: '#/components/schemas/User'
        subject_type:
          type: string
        subject_id:
          type: integer
        properties:
          type: object
          nullable: true
          additionalProperties: true
        project_id:
          type: integer
          nullable: true
        team_id:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time

    Notification:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        data:
          type: object
          additionalProperties: true
          nullable: true
        read_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    ProjectStats:
      type: object
      description: Project statistics — exact shape depends on ProjectService.stats() implementation
      additionalProperties: true

    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
        last_page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        from:
          type: integer
          nullable: true
        to:
          type: integer
          nullable: true

    PaginationLinks:
      type: object
      properties:
        first:
          type: string
          nullable: true
        last:
          type: string
          nullable: true
        prev:
          type: string
          nullable: true
        next:
          type: string
          nullable: true

    AuthResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string

    ValidationError:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    Error:
      type: object
      properties:
        message:
          type: string

  parameters:
    PerPage:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

paths:
  /health:
    get:
      operationId: health.check
      summary: Health check
      tags: [Health]
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /auth/register:
    post:
      operationId: auth.register
      summary: Register a new user
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  maxLength: 255
                email:
                  type: string
                  format: email
                  maxLength: 255
                password:
                  type: string
                  minLength: 8
                  maxLength: 255
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /auth/login:
    post:
      operationId: auth.login
      summary: Log in and obtain an API token
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  maxLength: 255
                password:
                  type: string
      responses:
        '200':
          description: Authenticated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '422':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /auth/logout:
    post:
      operationId: auth.logout
      summary: Log out (invalidate API token)
      tags: [Auth]
      responses:
        '204':
          description: Logged out successfully
        '401':
          description: Unauthenticated

  /auth/me:
    get:
      operationId: auth.me
      summary: Get the authenticated user
      tags: [Auth]
      responses:
        '200':
          description: Authenticated user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          description: Unauthenticated

  /auth/profile:
    patch:
      operationId: auth.updateProfile
      summary: Update the authenticated user's profile
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 255
                avatar_url:
                  type: string
                  nullable: true
                  maxLength: 2048
                timezone:
                  type: string
                  maxLength: 64
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          description: Unauthenticated
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /auth/password:
    post:
      operationId: auth.changePassword
      summary: Change the authenticated user's password
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password:
                  type: string
                new_password:
                  type: string
                  minLength: 8
                  maxLength: 255
      responses:
        '204':
          description: Password changed successfully
        '401':
          description: Unauthenticated
        '422':
          description: Validation error (e.g. current password incorrect)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /users:
    get:
      operationId: users.index
      summary: List users
      tags: [Users]
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - name: q
          in: query
          description: Search by name or email
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
                  links:
                    $ref: '#/components/schemas/PaginationLinks'
        '401':
          description: Unauthenticated

  /users/{user}:
    parameters:
      - name: user
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: users.show
      summary: Get a user by ID
      tags: [Users]
      responses:
        '200':
          description: User resource
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          description: Unauthenticated
        '404':
          description: Not found
    patch:
      operationId: users.update
      summary: Update a user (admin only)
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 255
                email:
                  type: string
                  format: email
                  maxLength: 255
                role:
                  type: string
                  enum: [admin, member]
                avatar_url:
                  type: string
                  nullable: true
                  maxLength: 2048
                timezone:
                  type: string
                  maxLength: 64
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          description: Unauthenticated
        '403':
          description: Forbidden (admin only)
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    delete:
      operationId: users.destroy
      summary: Delete a user (admin only)
      tags: [Users]
      responses:
        '204':
          description: User deleted
        '401':
          description: Unauthenticated
        '403':
          description: Forbidden (admin only)
        '404':
          description: Not found

  /teams:
    get:
      operationId: teams.index
      summary: List teams the authenticated user belongs to
      tags: [Teams]
      parameters:
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated list of teams
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Team'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
                  links:
                    $ref: '#/components/schemas/PaginationLinks'
        '401':
          description: Unauthenticated
    post:
      operationId: teams.store
      summary: Create a new team
      tags: [Teams]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, slug]
              properties:
                name:
                  type: string
                  maxLength: 255
                slug:
                  type: string
                  maxLength: 255
                  pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
                description:
                  type: string
                  nullable: true
      responses:
        '201':
          description: Team created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Team'
        '401':
          description: Unauthenticated
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /teams/{team}:
    parameters:
      - name: team
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: teams.show
      summary: Get a team by ID
      tags: [Teams]
      responses:
        '200':
          description: Team resource
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Team'
        '401':
          description: Unauthenticated
        '403':
          description: Forbidden
        '404':
          description: Not found
    patch:
      operationId: teams.update
      summary: Update a team
      tags: [Teams]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 255
                slug:
                  type: string
                  maxLength: 255
                  pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
                description:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Team updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Team'
        '401':
          description: Unauthenticated
        '403':
          description: Forbidden
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    delete:
      operationId: teams.destroy
      summary: Delete a team
      tags: [Teams]
      responses:
        '204':
          description: Team deleted
        '401':
          description: Unauthenticated
        '403':
          description: Forbidden
        '404':
          description: Not found

  /teams/{team}/members:
    parameters:
      - name: team
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: teamMembers.index
      summary: List members of a team
      tags: [Team Members]
      responses:
        '200':
          description: List of team members
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TeamMember'
        '401':
          description: Unauthenticated
        '403':
          description: Forbidden
    post:
      operationId: teamMembers.store
      summary: Invite a user to the team by email
      tags: [Team Members]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, role]
              properties:
                email:
                  type: string
                  format: email
                  maxLength: 255
                role:
                  type: string
                  enum: [owner, admin, member]
      responses:
        '201':
          description: Member added
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/TeamMember'
        '401':
          description: Unauthenticated
        '403':
          description: Forbidden
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /teams/{team}/members/{user}:
    parameters:
      - name: team
        in: path
        required: true
        schema:
          type: integer
      - name: user
        in: path
        required: true
        schema:
          type: integer
    patch:
      operationId: teamMembers.update
      summary: Update a team member's role
      tags: [Team Members]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [owner, admin, member]
      responses:
        '200':
          description: Member updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/TeamMember'
        '401':
          description: Unauthenticated
        '403':
          description: Forbidden
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    delete:
      operationId: teamMembers.destroy
      summary: Remove a member from the team
      tags: [Team Members]
      responses:
        '204':
          description: Member removed
        '401':
          description: Unauthenticated
        '403':
          description: Forbidden
        '404':
          description: Not found

  /teams/{team}/projects:
    parameters:
      - name: team
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: projects.index
      summary: List projects in a team
      tags: [Projects]
      parameters:
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated list of projects
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
                  links:
                    $ref: '#/components/schemas/PaginationLinks'
        '401':
          description: Unauthenticated
        '403':
          description: Forbidden
    post:
      operationId: projects.store
      summary: Create a project in a team
      tags: [Projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, key]
              properties:
                name:
                  type: string
                  maxLength: 255
                key:
                  type: string
                  maxLength: 16
                  pattern: '^[A-Z0-9]+$'
                  description: Uppercase alphanumeric, unique per team
                description:
                  type: string
                  nullable: true
                status:
                  type: string
                  enum: [active, archived]
                color:
                  type: string
                  nullable: true
                  maxLength: 32
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Project'
        '401':
          description: Unauthenticated
        '403':
          description: Forbidden
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

  /projects/{project}:
    parameters:
      - name: project
        in: path
        required: true
        schema:
          type: integer
    get:
      operationId: projects.show
      summary: Get a project by ID
      tags: [Projects]
      responses:
        '200':
          description: Project resource
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Project'
        '401':
          description: Unauthenticated
        '403':
          description: Forbidden
        '404':
          description: Not found
    patch:
      operationId: projects.update
      summary: Update a project
      tags: [Projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 255
                key:
                  type: string
                  maxLength: 16
                  pattern: '^[A-Z0-9]+$'
                description:
                  type: string
                  nullable: true
                status:
                  type: string
                  enum: [active, archived]
                color:
                  type: string
                  nullable: true
                  maxLength: 32
      responses:
        '200':
          description: Project updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Project'
        '401':
          description: Unauthenticated
        '403':
          description: Forbidden
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
    delete:
      operationId: projects.destroy
