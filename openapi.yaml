  # ══════════════════════════════════════════════
  # Tasks
  # ══════════════════════════════════════════════
  /projects/{project}/tasks:
    parameters:
      - name: project
        in: path
        required: true
        schema:
          type: integer
        description: Project ID.
    get:
      operationId: listTasks
      summary: List tasks in a project
      tags: [Tasks]
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - name: status
          in: query
          schema:
            type: string
            enum: [todo, in_progress, in_review, done, cancelled]
        - name: priority
          in: query
          schema:
            type: string
            enum: [low, medium, high, urgent]
        - name: assignee_id
          in: query
          schema:
            type: integer
        - name: label_id
          in: query
          schema:
            type: integer
        - name: due_before
          in: query
          schema:
            type: string
            format: date
        - name: due_after
          in: query
          schema:
            type: string
            format: date
        - name: q
          in: query
          schema:
            type: string
            maxLength: 255
          description: Full-text search on title and description.
        - name: overdue
          in: query
          schema:
            type: boolean
        - name: parent_id
          in: query
          schema:
            type: integer
          description: Filter tasks by parent task ID.
        - name: root
          in: query
          schema:
            type: boolean
          description: When true, return only top-level tasks (no parent).
        - name: sort
          in: query
          schema:
            type: string
            enum: [created_at, due_date, priority, position, title]
            default: position
        - name: dir
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        '200':
          description: Paginated list of tasks.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTasks'
        '401':
          description: Unauthenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '403':
          description: Forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
    post:
      operationId: createTask
      summary: Create a task in a project
      tags: [Tasks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                  maxLength: 255
                description:
                  type: string
                  nullable: true
                status:
                  type: string
                  enum: [todo, in_progress, in_review, done, cancelled]
                  default: todo
                priority:
                  type: string
                  enum: [low, medium, high, urgent]
                assignee_id:
                  type: integer
                  nullable: true
                parent_id:
                  type: integer
                  nullable: true
                due_date:
                  type: string
                  format: date
                  nullable: true
                position:
                  type: integer
                  minimum: 0
                label_ids:
                  type: array
                  items:
                    type: integer
      responses:
        '200':
          description: Task created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Task'
        '401':
          description: Unauthenticated.
          content:
            application/json:
