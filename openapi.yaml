  /tasks/{task}/attachments:
    parameters:
      - $ref: "#/components/parameters/TaskId"
    get:
      tags: [Attachments]
      summary: List attachments for a task
      parameters:
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Page"
      responses:
        "200":
          description: Paginated attachments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachmentCollection"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Attachments]
      summary: Upload an attachment to a task
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Max size 20480 KB
      responses:
        "201":
          description: Created attachment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachmentWrap"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /attachments/{attachment}/download:
    parameters:
      - name: attachment
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [Attachments]
      summary: Download an attachment
      responses:
        "200":
          description: File contents
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /attachments/{attachment}:
    parameters:
      - name: attachment
        in: path
        required: true
        schema:
          type: integer
    delete:
      tags: [Attachments]
      summary: Delete an attachment
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /notifications:
    get:
      tags: [Notifications]
      summary: List the authenticated user notifications
      parameters:
        - name: unread
          in: query
          description: Only unread notifications when true
          schema:
            type: boolean
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Page"
      responses:
        "200":
          description: Paginated notifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationCollection"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /notifications/read-all:
    post:
      tags: [Notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: Count of updated notifications
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"

  /notifications/{notification}/read:
    parameters:
      - name: notification
        in: path
        required: true
        schema:
          type: integer
    post:
      tags: [Notifications]
      summary: Mark a notification as read
      responses:
        "200":
          description: Updated notification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationWrap"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /notifications/{notification}:
    parameters:
      - name: notification
        in: path
        required: true
        schema:
          type: integer
    delete:
      tags: [Notifications]
      summary: Delete a notification
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /activity:
    get:
      tags: [Activity]
      summary: List global activity logs visible to the user
      parameters:
        - name: team_id
          in: query
          schema:
            type: integer
        - name: project_id
          in: query
          schema:
            type: integer
        - name: causer_id
          in: query
          schema:
            type: integer
        - name: action
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/PerPage"
        - $ref: "#/components/parameters/Page"
      responses:
        "200":
          description: Paginated activity logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityLogCollection"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /dashboard:
    get:
      tags: [Dashboard]
      summary: Get the authenticated user dashboard
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                type: object
                properties:
                  my_tasks_by_status:
                    type: object
                    additionalProperties:
                      type: integer
                    description: Counts of assigned tasks keyed by status
                  upcoming:
                    type: array
                    items:
                      $ref: "#/components/schemas/TaskListItem"
                  overdue_count:
                    type: integer
                  recent_activity:
                    type: array
                    items:
                      $ref: "#/components/schemas/ActivityLog"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /search:
    get:
      tags: [Search]
      summary: Search projects, tasks and comments
      parameters:
        - name: q
          in: query
          required: true
          description: Search term (2-255 characters)
          schema:
            type: string
            minLength: 2
            maxLength: 255
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      $ref: "#/components/schemas/Project"
                  tasks:
                    type: array
                    items:
                      $ref: "#/components/schemas/TaskListItem"
                  comments:
                    type: array
                    items:
                      $ref: "#/components/schemas/Comment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        Opaque API token returned by register/login. Send it as "Authorization: Bearer <token>".

  parameters:
    PerPage:
      name: per_page
      in: query
      description: Items per page (1-100, default 20)
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Page:
      name: page
      in: query
      description: Page number
      schema:
        type: integer
        minimum: 1
    UserId:
      name: user
      in: path
      required: true
      schema:
        type: integer
    TeamId:
      name: team
      in: path
      required: true
      schema:
        type: integer
    ProjectId:
      name: project
      in: path
      required: true
      schema:
        type: integer
    TaskId:
      name: task
      in: path
      required: true
      schema:
        type: integer

  responses:
    Unauthorized:
      description: Unauthenticated
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Message"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Message"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Message"
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationError"

  schemas:
    Message:
      type: object
      properties:
        message:
          type: string

    ValidationError:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    PaginationLinks:
      type: object
      properties:
        first:
          type: [string, "null"]
        last:
          type: [string, "null"]
        prev:
          type: [string, "null"]
        next:
          type: [string, "null"]

    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
        from:
          type: [integer, "null"]
        last_page:
          type: integer
        per_page:
          type: integer
        to:
          type: [integer, "null"]
        total:
          type: integer

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          description: Only present when viewing self or as admin
        role:
          type: string
          enum: [admin, member]
        avatar_url:
          type: [string, "null"]
        timezone:
          type: [string, "null"]
        created_at:
          type: [string, "null"]
          format: date-time

    UserWrap:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/User"

    UserCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
        links:
          $ref: "#/components/schemas/PaginationLinks"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    Team:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: [string, "null"]
        owner_id:
          type: integer
        owner:
          $ref: "#/components/schemas/User"
        members_count:
          type: integer
        projects_count:
          type: integer
        created_at:
          type: [string, "null"]
          format: date-time
        updated_at:
          type: [string, "null"]
          format: date-time

    TeamWrap:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Team"

    TeamCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Team"
        links:
          $ref: "#/components/schemas/PaginationLinks"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    TeamMember:
      type: object
      properties:
        id:
          type: integer
        team_id:
          type: [integer, "null"]
        user_id:
          type: [integer, "null"]
        role:
          type: [string, "null"]
          enum: [owner, admin, member, null]
        user:
          $ref: "#/components/schemas/User"
        created_at:
          type: [string, "null"]
          format: date-time
        updated_at:
          type: [string, "null"]
          format: date-time

    TeamMemberWrap:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/TeamMember"

    Project:
      type: object
      properties:
        id:
          type: integer
        team_id:
          type: integer
        name:
          type: string
        key:
          type: string
        description:
          type: [string, "null"]
        status:
          type: string
          enum: [active, archived]
        color:
          type: [string, "null"]
        created_by:
          type: [integer, "null"]
        team:
          $ref: "#/components/schemas/Team"
        creator:
          $ref: "#/components/schemas/User"
        members_count:
          type: integer
        tasks_count:
          type: integer
        created_at:
          type: [string, "null"]
          format: date-time
        updated_at:
          type: [string, "null"]
          format: date-time

    ProjectWrap:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Project"

    ProjectCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Project"
        links:
          $ref: "#/components/schemas/PaginationLinks"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    ProjectMember:
      type: object
      properties:
        id:
          type: integer
        project_id:
          type: [integer, "null"]
        user_id:
          type: [integer, "null"]
        role:
          type: [string, "null"]
          enum: [lead, contributor, viewer, null]
        user:
          $ref: "#/components/schemas/User"
        created_at:
          type: [string, "null"]
          format: date-time
        updated_at:
          type: [string, "null"]
          format: date-time

    ProjectMemberWrap:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/ProjectMember"

    ProjectStats:
      type: object
      properties:
        data:
          type: object
          properties:
            tasks_total:
              type: integer
            tasks_by_status:
              type: object
              additionalProperties:
                type: integer
            tasks_by_priority:
              type: object
              additionalProperties:
                type: integer
            overdue:
              type: integer
            completed:
              type: integer
            completion_pct:
              type: number
            members:
              type: integer

    Label:
      type: object
      properties:
        id:
          type: integer
        project_id:
          type: integer
        name:
          type: string
        color:
          type: string
        created_at:
          type: [string, "null"]
          format: date-time
        updated_at:
          type: [string, "null"]
          format: date-time

    LabelWrap:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Label"

    TaskCreate:
      type: object
      required: [title]
      properties:
        title:
          type: string
          maxLength: 255
        description:
          type: [string, "null"]
        status:
          type: string
          enum: [todo, in_progress, in_review, done, cancelled]
        priority:
          type: string
          enum: [low, medium, high, urgent]
        assignee_id:
          type: [integer, "null"]
        parent_id:
          type: [integer, "null"]
        due_date:
          type: [string, "null"]
          format: date
        position:
          type: integer
          minimum: 0
        label_ids:
          type: array
          items:
            type: integer

    Task:
      type: object
      properties:
        id:
          type: integer
        project_id:
          type: integer
        parent_id:
          type: [integer, "null"]
        title:
          type: string
        description:
          type: [string, "null"]
        status:
          type: string
          enum: [todo, in_progress, in_review, done, cancelled]
        priority:
          type: string
          enum: [low, medium, high, urgent]
        assignee_id:
          type: [integer, "null"]
        reporter_id:
          type: [integer, "null"]
        assignee:
          $ref: "#/components/schemas/User"
        reporter:
          $ref: "#/components/schemas/User"
        labels:
          type: array
          items:
            $ref: "#/components/schemas/Label"
        due_date:
          type: [string, "null"]
          format: date
        completed_at:
          type: [string, "null"]
          format: date-time
        position:
          type: integer
        is_overdue:
          type: boolean
        comments_count:
          type: integer
        attachments_count:
          type: integer
        subtasks_count:
          type: integer
        created_at:
          type: [string, "null"]
          format: date-time
        updated_at:
          type: [string, "null"]
          format: date-time

    TaskWrap:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Task"

    TaskListItem:
      type: object
      description: Lighter task representation (omits description)
      properties:
        id:
          type: integer
        project_id:
