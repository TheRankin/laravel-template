openapi: 3.1.0
info:
  title: Task Management API
  version: 1.0.0
  description: |
    REST API for a Laravel-based task management application. Supports teams,
    projects, tasks (with subtasks, labels, comments, attachments), activity
    feeds, notifications, search and a personal dashboard. Authentication uses
    opaque bearer tokens issued at register/login.
servers:
  - url: /api
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Users
  - name: Teams
  - name: Team Members
  - name: Projects
  - name: Project Members
  - name: Labels
  - name: Tasks
  - name: Comments
  - name: Attachments
  - name: Notifications
  - name: Activity
  - name: Dashboard
  - name: Search
  - name: Health

paths:
  /health:
    get:
      tags: [Health]
      summary: Service health check
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        '201':
          description: User created and authenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in and obtain an API token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Log out the current user (invalidates the API token)
      responses:
        '204': { description: Logged out }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/me:
    get:
      tags: [Auth]
      summary: Get the authenticated user
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/profile:
    patch:
      tags: [Auth]
      summary: Update the authenticated user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateProfileRequest' }
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /auth/password:
    post:
      tags: [Auth]
      summary: Change the authenticated user's password
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChangePasswordRequest' }
      responses:
        '204': { description: Password changed }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /users:
    get:
      tags: [Users]
      summary: List users
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - in: query
          name: q
          schema: { type: string }
          description: Filter by name or email substring
      responses:
        '200':
          description: Paginated user list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserCollection' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /users/{user}:
    parameters:
      - $ref: '#/components/parameters/UserId'
    get:
      tags: [Users]
      summary: Get a user by id
      responses:
        '200':
          description: User
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/User' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Users]
      summary: Update a user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateUserRequest' }
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/User' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Users]
      summary: Delete a user (admin only)
      responses:
        '204': { description: Deleted }
        '403': { $ref: '#/components/responses/Forbidden' }

  /teams:
    get:
      tags: [Teams]
      summary: List teams the authenticated user belongs to
      parameters:
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated team list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TeamCollection' }
    post:
      tags: [Teams]
      summary: Create a team
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/StoreTeamRequest' }
      responses:
        '201':
          description: Team created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Team' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /teams/{team}:
    parameters:
      - $ref: '#/components/parameters/TeamId'
    get:
      tags: [Teams]
      summary: Get a team
      responses:
        '200':
          description: Team
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Team' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Teams]
      summary: Update a team
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateTeamRequest' }
      responses:
        '200':
          description: Team updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Team' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Teams]
      summary: Delete a team
      responses:
        '204': { description: Deleted }
        '403': { $ref: '#/components/responses/Forbidden' }

  /teams/{team}/members:
    parameters:
      - $ref: '#/components/parameters/TeamId'
    get:
      tags: [Team Members]
      summary: List team members
      responses:
        '200':
          description: Team members
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/TeamMember' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Team Members]
      summary: Invite a user to the team by email
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InviteTeamMemberRequest' }
      responses:
        '201':
          description: Member invited / added
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/TeamMember' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /teams/{team}/members/{user}:
    parameters:
      - $ref: '#/components/parameters/TeamId'
      - $ref: '#/components/parameters/UserId'
    patch:
      tags: [Team Members]
      summary: Update a team member's role
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateTeamMemberRequest' }
      responses:
        '200':
          description: Member updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/TeamMember' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Team Members]
      summary: Remove a member from the team
      responses:
        '204': { description: Removed }
        '403': { $ref: '#/components/responses/Forbidden' }

  /teams/{team}/projects:
    parameters:
      - $ref: '#/components/parameters/TeamId'
    get:
      tags: [Projects]
      summary: List projects in a team
      parameters:
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated project list
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProjectCollection' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Projects]
      summary: Create a project in a team
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/StoreProjectRequest' }
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Project' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /projects/{project}:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Projects]
      summary: Get a project
      responses:
        '200':
          description: Project
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Project' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Projects]
      summary: Update a project
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateProjectRequest' }
      responses:
        '200':
          description: Project updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Project' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Projects]
      summary: Delete a project
      responses:
        '204': { description: Deleted }
        '403': { $ref: '#/components/responses/Forbidden' }

  /projects/{project}/archive:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    post:
      tags: [Projects]
      summary: Archive a project
      responses:
        '200':
          description: Project archived
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Project' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /projects/{project}/restore:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    post:
      tags: [Projects]
      summary: Restore an archived project
      responses:
        '200':
          description: Project restored
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Project' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /projects/{project}/stats:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Projects]
      summary: Get aggregate statistics for a project
      responses:
        '200':
          description: Project stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    additionalProperties: true
                    description: |
                      Aggregated counters/metrics for the project. Exact keys are
                      computed by the ProjectService::stats() method.
        '403': { $ref: '#/components/responses/Forbidden' }

  /projects/{project}/members:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Project Members]
      summary: List project members
      responses:
        '200':
          description: Members
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ProjectMember' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Project Members]
      summary: Add a member to the project
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/StoreProjectMemberRequest' }
      responses:
        '201':
          description: Member added
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/ProjectMember' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /projects/{project}/members/{user}:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/UserId'
    patch:
      tags: [Project Members]
      summary: Update a project member's role
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateProjectMemberRequest' }
      responses:
        '200':
          description: Member updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/ProjectMember' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Project Members]
      summary: Remove a member from the project
      responses:
        '204': { description: Removed }
        '403': { $ref: '#/components/responses/Forbidden' }

  /projects/{project}/activity:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Activity]
      summary: List activity log entries for a project
      parameters:
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Activity log entries
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ActivityLogCollection' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /projects/{project}/labels:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Labels]
      summary: List labels for a project
      responses:
        '200':
          description: Labels
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Label' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Labels]
      summary: Create a label in a project
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/StoreLabelRequest' }
      responses:
        '201':
          description: Label created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Label' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /labels/{label}:
    parameters:
      - in: path
        name: label
        required: true
        schema: { type: integer, format: int64 }
    patch:
      tags: [Labels]
      summary: Update a label
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateLabelRequest' }
      responses:
        '200':
          description: Label updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Label' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Labels]
      summary: Delete a label
      responses:
        '204': { description: Deleted }
        '403': { $ref: '#/components/responses/Forbidden' }

  /projects/{project}/tasks:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Tasks]
      summary: List tasks in a project
      parameters:
        - in: query
          name: status
          schema: { $ref: '#/components/schemas/TaskStatus' }
        - in: query
          name: priority
          schema: { $ref: '#/components/schemas/TaskPriority' }
        - in: query
          name: assignee_id
          schema: { type: integer, nullable: true }
        - in: query
          name: label_id
          schema: { type: integer, nullable: true }
        - in: query
          name: due_before
          schema: { type: string, format: date }
        - in: query
          name: due_after
          schema: { type: string, format: date }
        - in: query
          name: q
          schema: { type: string }
          description: Free-text search over title and description
        - in: query
          name: overdue
          schema: { type: boolean }
        - in: query
          name: parent_id
          schema: { type: integer, nullable: true }
        - in: query
          name: root
          schema: { type: boolean }
          description: Only return top-level tasks (no parent)
        - in: query
          name: sort
          schema:
            type: string
            enum: [created_at, due_date, priority, position, title]
            default: position
        - in: query
          name: dir
          schema:
            type: string
            enum: [asc, desc]
            default: asc
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated tasks
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TaskListCollection' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Tasks]
      summary: Create a task in a project
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/StoreTaskRequest' }
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Task' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /tasks/{task}:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    get:
      tags: [Tasks]
      summary: Get a task
      responses:
        '200':
          description: Task
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Task' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Tasks]
      summary: Update a task
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateTaskRequest' }
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Task' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Tasks]
      summary: Delete a task
      responses:
        '204': { description: Deleted }
        '403': { $ref: '#/components/responses/Forbidden' }

  /tasks/{task}/assign:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    post:
      tags: [Tasks]
      summary: Assign a task to a user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AssignTaskRequest' }
      responses:
        '200':
          description: Task assigned
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Task' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /tasks/{task}/unassign:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    post:
      tags: [Tasks]
      summary: Remove the current assignee from a task
      responses:
        '200':
          description: Task unassigned
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Task' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /tasks/{task}/status:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    post:
      tags: [Tasks]
      summary: Transition a task to a new status
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TransitionStatusRequest' }
      responses:
        '200':
          description: Status transitioned
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Task' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /tasks/{task}/priority:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    post:
      tags: [Tasks]
      summary: Update task priority
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdatePriorityRequest' }
      responses:
        '200':
          description: Priority updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Task' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /tasks/{task}/labels:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    post:
      tags: [Tasks]
      summary: Sync the set of labels attached to a task
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SyncLabelsRequest' }
      responses:
        '200':
          description: Labels synced
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Task' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /tasks/{task}/subtasks:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    get:
      tags: [Tasks]
      summary: List subtasks of a task (ordered by position)
      responses:
        '200':
          description: Subtasks
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/TaskListItem' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Tasks]
      summary: Create a subtask of a task
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/StoreTaskRequest' }
      responses:
        '201':
          description: Subtask created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Task' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /tasks/{task}/reorder:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    post:
      tags: [Tasks]
      summary: Reorder a task to a new position within its siblings
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReorderTaskRequest' }
      responses:
        '200':
          description: Task reordered
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Task' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /tasks/{task}/activity:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    get:
      tags: [Activity]
      summary: List activity log entries for a task
      parameters:
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Activity log entries
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ActivityLogCollection' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /tasks/{task}/comments:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    get:
      tags: [Comments]
      summary: List comments on a task
      parameters:
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated comments (newest first)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CommentCollection' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Comments]
      summary: Post a comment on a task
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/StoreCommentRequest' }
      responses:
        '201':
          description: Comment created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Comment' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /comments/{comment}:
    parameters:
      - in: path
        name: comment
        required: true
        schema: { type: integer, format: int64 }
    patch:
      tags: [Comments]
      summary: Update a comment
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateCommentRequest' }
      responses:
        '200':
          description: Comment updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Comment' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Comments]
      summary: Delete a comment
      responses:
        '204': { description: Deleted }
        '403': { $ref: '#/components/responses/Forbidden' }

  /tasks/{task}/attachments:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    get:
      tags: [Attachments]
      summary: List attachments on a task
      parameters:
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated attachments
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AttachmentCollection' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Attachments]
      summary: Upload an attachment to a task
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: File to upload (max 20 MB)
      responses:
        '201':
          description: Attachment created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Attachment' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /attachments/{attachment}/download:
    parameters:
      - in: path
        name: attachment
        required: true
        schema: { type: integer, format: int64 }
    get:
      tags: [Attachments]
      summary: Download an attachment
      responses:
        '200':
          description: File download
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /attachments/{attachment}:
    parameters:
      - in: path
        name: attachment
        required: true
        schema: { type: integer, format: int64 }
    delete:
      tags: [Attachments]
      summary: Delete an attachment
      responses:
        '204': { description: Deleted }
        '403': { $ref: '#/components/responses/Forbidden' }

  /notifications:
    get:
      tags: [Notifications]
      summary: List notifications for the authenticated user
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - in: query
          name: unread
          schema: { type: boolean }
          description: When true, return only unread notifications
      responses:
        '200':
          description: Paginated notifications
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotificationCollection' }

  /notifications/read-all:
    post:
      tags: [Notifications]
      summary: Mark all unread notifications as read
      responses:
        '200':
          description: Number of notifications updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated: { type: integer, example: 3 }

  /notifications/{notification}/read:
    parameters:
      - in: path
        name: notification
        required: true
        schema: { type: integer, format: int64 }
    post:
      tags: [Notifications]
      summary: Mark a notification as read
      responses:
        '200':
          description: Notification
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Notification' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /notifications/{notification}:
    parameters:
      - in: path
        name: notification
        required: true
        schema: { type: integer, format: int64 }
    delete:
      tags: [Notifications]
      summary: Delete a notification
      responses:
        '204': { description: Deleted }
        '403': { $ref: '#/components/responses/Forbidden' }

  /activity:
    get:
      tags: [Activity]
      summary: Global activity feed (scoped to user's teams and projects)
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - in: query
          name: team_id
          schema: { type: integer }
        - in: query
          name: project_id
          schema: { type: integer }
        - in: query
          name: causer_id
          schema: { type: integer }
        - in: query
          name: action
          schema: { type: string }
      responses:
        '200':
          description: Activity log entries
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ActivityLogCollection' }

  /dashboard:
    get:
      tags: [Dashboard]
      summary: Personal dashboard summary
      responses:
        '200':
          description: Dashboard data
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Dashboard' }

  /search:
    get:
      tags: [Search]
      summary: Search across projects, tasks and comments
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string, minLength: 2, maxLength: 255 }
      responses:
        '200':
          description: Grouped search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items: { $ref: '#/components/schemas/Project' }
                  tasks:
                    type: array
                    items: { $ref: '#/components/schemas/TaskListItem' }
                  comments:
                    type: array
                    items: { $ref: '#/components/schemas/Comment' }
        '422': { $ref: '#/components/responses/ValidationError' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Opaque API token returned by `/auth/login` or `/auth/register`.

  parameters:
    PerPage:
      in: query
      name: per_page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    UserId:
      in: path
      name: user
      required: true
      schema: { type: integer, format: int64 }
    TeamId:
      in: path
      name: team
      required: true
      schema: { type: integer, format: int64 }
    ProjectId:
      in: path
      name: project
      required: true
      schema: { type: integer, format: int64 }
    TaskId:
      in: path
      name: task
      required: true
      schema: { type: integer, format: int64 }

  responses:
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorMessage' }
    Forbidden:
      description: Authenticated but not allowed
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorMessage' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorMessage' }
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ValidationError' }

  schemas:
    ErrorMessage:
      type: object
      properties:
        message: { type: string }

    ValidationError:
      type: object
      properties:
        message: { type: string }
        errors:
          type: object
          additionalProperties:
            type: array
            items: { type: string }

    Pagination:
      type: object
      properties:
        links:
          type: object
          properties:
            first: { type: string, nullable: true }
            last: { type: string, nullable: true }
            prev: { type: string, nullable: true }
            next: { type: string, nullable: true }
        meta:
          type: object
          properties:
            current_page: { type: integer }
            from: { type: integer, nullable: true }
            last_page: { type: integer }
            path: { type: string }
            per_page: { type: integer }
            to: { type: integer, nullable: true }
            total: { type: integer }

    TaskStatus:
      type: string
      enum: [todo, in_progress, in_review, done, cancelled]

    TaskPriority:
      type: string
      enum: [low, medium, high, urgent]

    UserRole:
      type: string
      enum: [admin, member]

    TeamMemberRole:
      type: string
      enum: [owner, admin, member]

    ProjectMemberRole:
      type: string
      enum: [lead, contributor, viewer]

    ProjectStatus:
      type: string
      enum: [active, archived]

    User:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email:
          type: string
          format: email
          nullable: true
          description: Only included for the authenticated user themself or for admins.
        role: { $ref: '#/components/schemas/UserRole' }
        avatar_url: { type: string, nullable: true }
        timezone: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    UserCollection:
      allOf:
        - $ref: '#/components/schemas/Pagination'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/User' }

    Team:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }
        description: { type: string, nullable: true }
        owner_id: { type: integer }
        owner: { $ref: '#/components/schemas/User' }
        members_count: { type: integer }
        projects_count: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    TeamCollection:
      allOf:
        - $ref: '#/components/schemas/Pagination'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/Team' }

    TeamMember:
      type: object
      properties:
        id: { type: integer }
        team_id: { type: integer, nullable: true }
        user_id: { type: integer, nullable: true }
        role: { $ref: '#/components/schemas/TeamMemberRole' }
        user: { $ref: '#/components/schemas/User' }
        created_at: { type: string, format: date-time, nullable: true }
        updated_at: { type: string, format: date-time, nullable: true }

    Project:
      type: object
      properties:
        id: { type: integer }
        team_id: { type: integer }
        name: { type: string }
        key:
          type: string
          maxLength: 16
          pattern: '^[A-Z0-9]+$'
        description: { type: string, nullable: true }
        status: { $ref: '#/components/schemas/ProjectStatus' }
        color: { type: string, nullable: true }
        created_by: { type: integer, nullable: true }
        team: { $ref: '#/components/schemas/Team' }
        creator: { $ref: '#/components/schemas/User' }
        members_count: { type: integer }
        tasks_count: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ProjectCollection:
      allOf:
        - $ref: '#/components/schemas/Pagination'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/Project' }

    ProjectMember:
      type: object
      properties:
        id: { type: integer }
        project_id: { type: integer, nullable: true }
        user_id: { type: integer, nullable: true }
        role: { $ref: '#/components/schemas/ProjectMemberRole' }
        user: { $ref: '#/components/schemas/User' }
        created_at: { type: string, format: date-time, nullable: true }
        updated_at: { type: string, format: date-time, nullable: true }

    Label:
      type: object
      properties:
        id: { type: integer }
        project_id: { type: integer }
        name: { type: string }
        color: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    Task:
      type: object
      properties:
        id: { type: integer }
        project_id: { type: integer }
        parent_id: { type: integer, nullable: true }
        title: { type: string }
        description: { type: string, nullable: true }
        status: { $ref: '#/components/schemas/TaskStatus' }
        priority: { $ref: '#/components/schemas/TaskPriority' }
        assignee_id: { type: integer, nullable: true }
        reporter_id: { type: integer, nullable: true }
        assignee: { $ref: '#/components/schemas/User' }
        reporter: { $ref: '#/components/schemas/User' }
        labels:
          type: array
          items: { $ref: '#/components/schemas/Label' }
        due_date: { type: string, format: date, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }
        position: { type: integer }
        is_overdue: { type: boolean }
        comments_count: { type: integer }
        attachments_count: { type: integer }
        subtasks_count: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    TaskListItem:
      description: Lighter task representation (no description) used in list endpoints.
      type: object
      properties:
        id: { type: integer }
        project_id: { type: integer }
        parent_id: { type: integer, nullable: true }
        title: { type: string }
        status: { $ref: '#/components/schemas/TaskStatus' }
        priority: { $ref: '#/components/schemas/TaskPriority' }
        assignee_id: { type: integer, nullable: true }
        reporter_id: { type: integer, nullable: true }
        assignee: { $ref: '#/components/schemas/User' }
        reporter: { $ref: '#/components/schemas/User' }
        labels:
          type: array
          items: { $ref: '#/components/schemas/Label' }
        due_date: { type: string, format: date, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }
        position: { type: integer }
        is_overdue: { type: boolean }
        comments_count: { type: integer }
        attachments_count: { type: integer }
        subtasks_count: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    TaskListCollection:
      allOf:
        - $ref: '#/components/schemas/Pagination'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/TaskListItem' }

    Comment:
      type: object
      properties:
        id: { type: integer }
        task_id: { type: integer }
        user_id: { type: integer }
        user: { $ref: '#/components/schemas/User' }
        body: { type: string }
        edited_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CommentCollection:
      allOf:
        - $ref: '#/components/schemas/Pagination'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/Comment' }

    Attachment:
      type: object
      properties:
        id: { type: integer }
        task_id: { type: integer }
        original_name: { type: string }
        mime: { type: string }
        size: { type: integer, description: Size in bytes }
        uploaded_by: { type: integer }
        uploader: { $ref: '#/components/schemas/User' }
        download_url: { type: string, format: uri }
        created_at: { type: string, format: date-time }

    AttachmentCollection:
      allOf:
        - $ref: '#/components/schemas/Pagination'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/Attachment' }

    ActivityLog:
      type: object
      properties:
        id: { type: integer }
        action: { type: string }
        causer_id: { type: integer, nullable: true }
        causer: { $ref: '#/components/schemas/User' }
        subject_type: { type: string, nullable: true }
        subject_id: { type: integer, nullable: true }
        properties:
          type: object
          additionalProperties: true
          nullable: true
        project_id: { type: integer, nullable: true }
        team_id: { type: integer, nullable: true }
        created_at: { type: string, format: date-time }

    ActivityLogCollection:
      allOf:
        - $ref: '#/components/schemas/Pagination'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/ActivityLog' }

    Notification:
      type: object
      properties:
        id: { type: integer }
        type: { type: string }
        data:
          type: object
          additionalProperties: true
        read_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    NotificationCollection:
      allOf:
        - $ref: '#/components/schemas/Pagination'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/Notification' }

    Dashboard:
      type: object
      properties:
        my_tasks_by_status:
          type: object
          properties:
            todo: { type: integer }
            in_progress: { type: integer }
            in_review: { type: integer }
            done: { type: integer }
            cancelled: { type: integer }
        upcoming:
          type: array
          description: Tasks due within the next 7 days, not done/cancelled.
          items: { $ref: '#/components/schemas/TaskListItem' }
        overdue_count: { type: integer }
        recent_activity:
          type: array
          items: { $ref: '#/components/schemas/ActivityLog' }

    # ---- Request bodies ----
    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name: { type: string, maxLength: 255 }
        email: { type: string, format: email, maxLength: 255 }
        password: { type: string, minLength: 8, maxLength: 255 }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    AuthResponse:
      type: object
      properties:
        user: { $ref: '#/components/schemas/User' }
        token:
          type: string
          description: API bearer token (60-char random string).

    UpdateProfileRequest:
      type: object
      properties:
        name: { type: string, maxLength: 255 }
        avatar_url: { type: string, maxLength: 2048, nullable: true }
        timezone: { type: string, maxLength: 64 }

    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password: { type: string }
        new_password:
          type: string
          minLength: 8
          maxLength: 255
          description: Must differ from current_password.

    UpdateUserRequest:
      type: object
      properties:
        name: { type: string, maxLength: 255 }
        email: { type: string, format: email, maxLength: 255 }
        role: { $ref: '#/components/schemas/UserRole' }
        avatar_url: { type: string, maxLength: 2048, nullable: true }
        timezone: { type: string, maxLength: 64 }

    StoreTeamRequest:
      type: object
      required: [name, slug]
      properties:
        name: { type: string, maxLength: 255 }
        slug:
          type: string
          maxLength: 255
          pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
        description: { type: string, nullable: true }

    UpdateTeamRequest:
      type: object
      properties:
        name: { type: string, maxLength: 255 }
        slug:
          type: string
          maxLength: 255
          pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
        description: { type: string, nullable: true }

    InviteTeamMemberRequest:
      type: object
      required: [email, role]
      properties:
        email: { type: string, format: email, maxLength: 255 }
        role: { $ref: '#/components/schemas/TeamMemberRole' }

    UpdateTeamMemberRequest:
      type: object
      required: [role]
      properties:
        role: { $ref: '#/components/schemas/TeamMemberRole' }

    StoreProjectRequest:
      type: object
      required: [name, key]
      properties:
        name: { type: string, maxLength: 255 }
        key:
          type: string
          maxLength: 16
          pattern: '^[A-Z0-9]+$'
        description: { type: string, nullable: true }
        status: { $ref: '#/components/schemas/ProjectStatus' }
        color: { type: string, maxLength: 32, nullable: true }

    UpdateProjectRequest:
      type: object
      properties:
        name: { type: string, maxLength: 255 }
        key:
          type: string
          maxLength: 16
          pattern: '^[A-Z0-9]+$'
        description: { type: string, nullable: true }
        status: { $ref: '#/components/schemas/ProjectStatus' }
        color: { type: string, maxLength: 32, nullable: true }

    StoreProjectMemberRequest:
      type: object
      required: [user_id, role]
      properties:
        user_id: { type: integer }
        role: { $ref: '#/components/schemas/ProjectMemberRole' }

    UpdateProjectMemberRequest:
      type: object
      required: [role]
      properties:
        role: { $ref: '#/components/schemas/ProjectMemberRole' }

    StoreLabelRequest:
      type: object
      required: [name, color]
      properties:
        name: { type: string, maxLength: 64 }
        color:
          type: string
          maxLength: 32
          pattern: '^#?[0-9a-fA-F]{3,8}$'

    UpdateLabelRequest:
      type: object
      properties:
        name: { type: string, maxLength: 64 }
        color:
          type: string
          maxLength: 32
          pattern: '^#?[0-9a-fA-F]{3,8}$'

    StoreTaskRequest:
      type: object
      required: [title]
      properties:
        title: { type: string, maxLength: 255 }
        description: { type: string, nullable: true }
        status: { $ref: '#/components/schemas/TaskStatus' }
        priority: { $ref: '#/components/schemas/TaskPriority' }
        assignee_id: { type: integer, nullable: true }
        parent_id: { type: integer, nullable: true }
        due_date: { type: string, format: date, nullable: true }
        position: { type: integer, minimum: 0 }
        label_ids:
          type: array
          items: { type: integer }

    UpdateTaskRequest:
      type: object
      properties:
        title: { type: string, maxLength: 255 }
        description: { type: string, nullable: true }
        status: { $ref: '#/components/schemas/TaskStatus' }
        priority: { $ref: '#/components/schemas/TaskPriority' }
        assignee_id: { type: integer, nullable: true }
        parent_id: { type: integer, nullable: true }
        due_date: { type: string, format: date, nullable: true }
        position: { type: integer, minimum: 0 }

    AssignTaskRequest:
      type: object
      required: [user_id]
      properties:
        user_id: { type: integer }

    TransitionStatusRequest:
      type: object
      required: [status]
      properties:
        status: { $ref: '#/components/schemas/TaskStatus' }

    UpdatePriorityRequest:
      type: object
      required: [priority]
      properties:
        priority: { $ref: '#/components/schemas/TaskPriority' }

    SyncLabelsRequest:
      type: object
      required: [label_ids]
      properties:
        label_ids:
          type: array
          items: { type: integer }
          description: Complete set of label IDs to associate with the task.

    ReorderTaskRequest:
      type: object
      required: [position]
      properties:
        position: { type: integer, minimum: 0 }

    StoreCommentRequest:
      type: object
      required: [body]
      properties:
        body: { type: string, maxLength: 10000 }

    UpdateCommentRequest:
      type: object
      properties:
        body: { type: string, maxLength: 10000 }
