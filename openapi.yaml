openapi: 3.1.0
info:
  title: Project Management API
  version: 1.0.0
  description: >
    HTTP API for a team / project / task management application (Laravel).
    This document is scoped to the user and team management surface.
    All authenticated endpoints expect a bearer token obtained from the
    register or login endpoints.
servers:
  - url: /api
    description: API root
tags:
  - name: Auth
  - name: Users
  - name: Teams
  - name: Team Members
security:
  - bearerAuth: []
paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  maxLength: 255
                email:
                  type: string
                  format: email
                  maxLength: 255
                  description: Must be unique across users.
                password:
                  type: string
                  minLength: 8
                  maxLength: 255
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "422":
          $ref: "#/components/responses/ValidationError"
  /auth/login:
    post:
      tags: [Auth]
      summary: Log in and obtain an API token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "422":
          $ref: "#/components/responses/ValidationError"
  /auth/logout:
    post:
      tags: [Auth]
      summary: Log out (revoke current token)
      responses:
        "204":
          description: Logged out
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/me:
    get:
      tags: [Auth]
      summary: Get the authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWrapper"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/profile:
    patch:
      tags: [Auth]
      summary: Update own profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 255
                avatar_url:
                  type: [string, "null"]
                  maxLength: 2048
                timezone:
                  type: string
                  maxLength: 64
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWrapper"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
  /auth/password:
    post:
      tags: [Auth]
      summary: Change own password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password:
                  type: string
                new_password:
                  type: string
                  minLength: 8
                  maxLength: 255
                  description: Must differ from the current password.
      responses:
        "204":
          description: Password changed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
  /users:
    get:
      tags: [Users]
      summary: List users
      parameters:
        - $ref: "#/components/parameters/PerPage"
        - name: q
          in: query
          description: Search term matched against name and email.
          schema:
            type: string
      responses:
        "200":
          description: Paginated users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserCollection"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /users/{user}:
    parameters:
      - $ref: "#/components/parameters/UserId"
    get:
      tags: [Users]
      summary: Get a user
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWrapper"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Users]
      summary: Update a user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 255
                email:
                  type: string
                  format: email
                  maxLength: 255
                  description: Must be unique across users.
                role:
                  type: string
                  enum: [admin, member]
                avatar_url:
                  type: [string, "null"]
                  maxLength: 2048
                timezone:
                  type: string
                  maxLength: 64
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWrapper"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [Users]
      summary: Delete a user (admin only)
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /teams:
    get:
      tags: [Teams]
      summary: List teams the user belongs to
      parameters:
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Paginated teams
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamCollection"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Teams]
      summary: Create a team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, slug]
              properties:
                name:
                  type: string
                  maxLength: 255
                slug:
                  type: string
                  maxLength: 255
                  description: Must be unique across teams.
                  pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
                description:
                  type: [string, "null"]
      responses:
        "201":
          description: Team created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamWrapper"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
  /teams/{team}:
    parameters:
      - $ref: "#/components/parameters/TeamId"
    get:
      tags: [Teams]
      summary: Get a team
      responses:
        "200":
          description: Team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamWrapper"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Teams]
      summary: Update a team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 255
                slug:
                  type: string
                  maxLength: 255
                  description: Must be unique across teams.
                  pattern: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
                description:
                  type: [string, "null"]
      responses:
        "200":
          description: Updated team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamWrapper"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [Teams]
      summary: Delete a team
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /teams/{team}/members:
    parameters:
      - $ref: "#/components/parameters/TeamId"
    get:
      tags: [Team Members]
      summary: List team members
      responses:
        "200":
          description: Team members
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TeamMember"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Team Members]
      summary: Invite a member to the team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, role]
              properties:
                email:
                  type: string
                  format: email
                  maxLength: 255
                role:
                  type: string
                  enum: [owner, admin, member]
      responses:
        "201":
          description: Member invited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMemberWrapper"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
  /teams/{team}/members/{user}:
    parameters:
      - $ref: "#/components/parameters/TeamId"
      - $ref: "#/components/parameters/UserId"
    patch:
      tags: [Team Members]
      summary: Update a team member's role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [owner, admin, member]
      responses:
        "200":
          description: Updated member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMemberWrapper"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [Team Members]
      summary: Remove a team member
      responses:
        "204":
          description: Removed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: "API token sent as: Authorization: Bearer <token>"
  parameters:
    PerPage:
      name: per_page
      in: query
      description: Items per page (1-100, default 20).
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    UserId:
      name: user
      in: path
      required: true
      schema:
        type: integer
    TeamId:
      name: team
      in: path
      required: true
      schema:
        type: integer
  responses:
    Unauthorized:
      description: Unauthenticated
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageError"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageError"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageError"
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationError"
  schemas:
    MessageError:
      type: object
      properties:
        message:
          type: string
    ValidationError:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    PaginationLinks:
      type: object
      properties:
        first:
          type: [string, "null"]
        last:
          type: [string, "null"]
        prev:
          type: [string, "null"]
        next:
          type: [string, "null"]
    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
        from:
          type: [integer, "null"]
        last_page:
          type: integer
        path:
          type: string
        per_page:
          type: integer
        to:
          type: [integer, "null"]
        total:
          type: integer
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          description: Only present when viewing your own user or as an admin.
        role:
          type: string
          enum: [admin, member]
        avatar_url:
          type: [string, "null"]
        timezone:
          type: [string, "null"]
        created_at:
          type: [string, "null"]
          format: date-time
    UserWrapper:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/User"
    UserCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
        links:
          $ref: "#/components/schemas/PaginationLinks"
        meta:
          $ref: "#/components/schemas/PaginationMeta"
    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
    Team:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: [string, "null"]
        owner_id:
          type: integer
        owner:
          $ref: "#/components/schemas/User"
        members_count:
          type: integer
        projects_count:
          type: integer
        created_at:
          type: [string, "null"]
          format: date-time
        updated_at:
          type: [string, "null"]
          format: date-time
    TeamWrapper:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Team"
    TeamCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Team"
        links:
          $ref: "#/components/schemas/PaginationLinks"
        meta:
          $ref: "#/components/schemas/PaginationMeta"
    TeamMember:
      type: object
      description: >
        May be derived from a User loaded through the team membership pivot or
        from a TeamMember pivot model directly.
      properties:
        id:
          type: integer
        team_id:
          type: [integer, "null"]
        user_id:
          type: [integer, "null"]
        role:
          type: [string, "null"]
          enum: [owner, admin, member, null]
        user:
          $ref: "#/components/schemas/User"
        created_at:
          type: [string, "null"]
          format: date-time
        updated_at:
          type: [string, "null"]
          format: date-time
    TeamMemberWrapper:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/TeamMember"
