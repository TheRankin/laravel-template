                      todo:
                        type: integer
                      in_progress:
                        type: integer
                      in_review:
                        type: integer
                      done:
                        type: integer
                      cancelled:
                        type: integer
                  upcoming:
                    type: array
                    description: Tasks due within the next 7 days (max 10).
                    items:
                      $ref: '#/components/schemas/TaskList'
                  overdue_count:
                    type: integer
                  recent_activity:
                    type: array
                    description: Last 15 activity log entries caused by the user.
                    items:
                      $ref: '#/components/schemas/ActivityLog'
        '401':
          description: Unauthenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  # ══════════════════════════════════════════════
  # Search
  # ══════════════════════════════════════════════
  /search:
    get:
      operationId: search
      summary: Search across projects, tasks, and comments
      tags: [Search]
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 255
          description: Search query string.
      responses:
        '200':
          description: Search results grouped by resource type.
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'
                  tasks:
                    type: array
                    items:
                      $ref: '#/components/schemas/TaskList'
                  comments:
                    type: array
                    items:
                      $ref: '#/components/schemas/Comment'
        '401':
          description: Unauthenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '422':
          description: Validation error (e.g. query too short).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

