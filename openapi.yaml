        '404':
          description: Not found

  /attachments/{attachment}:
    parameters:
      - name: attachment
        in: path
        required: true
        schema:
          type: integer
    delete:
      operationId: attachments.destroy
      summary: Delete an attachment
      tags: [Attachments]
      responses:
        '204':
          description: Attachment deleted
        '401':
          description: Unauthenticated
        '403':
          description: Forbidden

  /notifications:
    get:
      operationId: notifications.index
      summary: List notifications for the authenticated user
      tags: [Notifications]
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - name: unread
          in: query
          description: Filter to only unread notifications
          schema:
            type: boolean
      responses:
        '200':
          description: Paginated list of notifications
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Notification'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
                  links:
                    $ref: '#/components/schemas/PaginationLinks'
        '401':
          description: Unauthenticated

  /notifications/read-all:
    post:
      operationId: notifications.markAllRead
      summary: Mark all notifications as read
      tags: [Notifications]
      responses:
        '200':
          description: Number of updated notifications
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: integer
        '401':
          description: Unauthenticated

  /notifications/{notification}/read:
    parameters:
      - name: notification
        in: path
        required: true
        schema:
          type: integer
    post:
      operationId: notifications.markRead
      summary: Mark a notification as read
      tags: [Notifications]
      responses:
        '200':
          description: Notification marked as read
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Notification'
        '401':
          description: Unauthenticated
        '403':
          description: Forbidden

  /notifications/{notification}:
    parameters:
      - name: notification
        in: path
        required: true
        schema:
          type: integer
    delete:
      operationId: notifications.destroy
      summary: Delete a notification
      tags: [Notifications]
      responses:
        '204':
          description: Notification deleted
        '401':
          description: Unauthenticated
        '403':
          description: Forbidden

  /activity:
    get:
      operationId: activity.index
      summary: Get global activity log (filtered by user membership)
      tags: [Activity]
      parameters:
        - $ref: '#/components/parameters/PerPage'
        - name: team_id
          in: query
          schema:
            type: integer
        - name: project_id
          in: query
          schema:
            type: integer
        - name: causer_id
          in: query
          schema:
            type: integer
        - name: action
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated activity log
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ActivityLog'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
                  links:
                    $ref: '#/components/schemas/PaginationLinks'
        '401':
          description: Unauthenticated

  /dashboard:
    get:
      operationId: dashboard.index
      summary: Get dashboard data for the authenticated user
      tags: [Dashboard]
      responses:
        '200':
          description: Dashboard data
          content:
            application/json:
              schema:
                type: object
                properties:
                  my_tasks_by_status:
                    type: object
                    properties:
                      todo:
                        type: integer
                      in_progress:
                        type: integer
                      in_review:
                        type: integer
                      done:
                        type: integer
                      cancelled:
                        type: integer
                  upcoming:
                    type: array
                    description: Tasks due in the next 7 days (max 10)
                    items:
                      $ref: '#/components/schemas/TaskList'
                  overdue_count:
                    type: integer
                  recent_activity:
                    type: array
                    description: Last 15 activity log entries by the authenticated user
                    items:
                      $ref: '#/components/schemas/ActivityLog'
        '401':
          description: Unauthenticated

  /search:
    get:
      operationId: search.index
      summary: Search across projects, tasks, and comments
      tags: [Search]
      parameters:
        - name: q
          in: query
          required: true
          description: Search query (min 2 characters)
          schema:
            type: string
            minLength: 2
            maxLength: 255
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'
                  tasks:
                    type: array
                    items:
                      $ref: '#/components/schemas/TaskList'
                  comments:
                    type: array
                    items:
                      $ref: '#/components/schemas/Comment'
        '401':
          description: Unauthenticated
        '422':
          description: Validation error (query too short)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'

