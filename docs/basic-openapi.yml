openapi: 3.1.0
info:
  title: Users and Teams API
  version: 1.0.0
  description: |
    API surface covering users and teams logic. This document is scoped to
    user and team related endpoints per the documented spec scope.
paths:
  /api/health:
    get:
      summary: Health check
      description: |
        Returns service health status. Note: this endpoint is outside the
        documented users/teams scope and is included only as a TODO placeholder.
        TODO: confirm whether this endpoint should be part of this spec.
      operationId: getHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          example: ok
        timestamp:
          type: string
          format: date-time
        laravel_version:
          type: string
          example: "11.0.0"
        database:
          type: string
          example: mysql
      required:
        - status
        - timestamp
        - laravel_version
        - database
