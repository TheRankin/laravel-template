openapi: 3.1.0
info:
  title: Users & Teams API
  version: 1.0.0
  description: >
    OpenAPI specification covering the authentication, user, team and
    team-member surface of the application. The API is token based: clients
    obtain a token via register/login and present it on subsequent requests.
servers:
  - url: /api
    description: API root (routes registered under the api prefix)
tags:
  - name: Auth
    description: Authentication and current-user profile management.
  - name: Users
    description: User listing and administration.
  - name: Teams
    description: Team CRUD operations.
  - name: Team Members
    description: Management of members within a team.
security:
  - bearerAuth: []
paths:
  /auth/register:
    post:
      tags: [ Auth ]
      summary: Register a new user
      description: Creates a user account and returns the user together with an API token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /auth/login:
    post:
      tags: [ Auth ]
      summary: Log in
      description: Validates credentials and returns the user together with a fresh
        API token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /auth/logout:
    post:
      tags: [ Auth ]
      summary: Log out
      description: Revokes the current API token for the authenticated user.
      responses:
        '204':
          description: Token revoked. No content.
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/me:
    get:
      tags: [ Auth ]
      summary: Get the authenticated user
      responses:
        '200':
          description: The current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/profile:
    patch:
      tags: [ Auth ]
      summary: Update the authenticated user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Updated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /auth/password:
    post:
      tags: [ Auth ]
      summary: Change the authenticated user password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          description: Password changed. No content.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /users:
    get:
      tags: [ Users ]
      summary: List users
      description: Returns a paginated list of users. Supports a free-text query over
        name and email.
      parameters:
        - name: q
          in: query
          required: false
          description: Free-text search applied to the user name and email.
          schema:
            type: string
        - name: per_page
          in: query
          required: false
          description: Page size, clamped between 1 and 100. Defaults to 20.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Paginated collection of users.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /users/{user}:
    parameters:
      - $ref: '#/components/parameters/UserId'
    get:
      tags: [ Users ]
      summary: Get a user
      responses:
        '200':
          description: The requested user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [ Users ]
      summary: Update a user
      description: "Administrative operation: requires the admin role."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Updated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [ Users ]
      summary: Delete a user
      description: "Administrative operation: requires the admin role."
      responses:
        '204':
          description: User deleted. No content.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /teams:
    get:
      tags: [ Teams ]
      summary: List teams
      description: Returns a paginated list of teams the authenticated user belongs to.
      parameters:
        - name: per_page
          in: query
          required: false
          description: Page size, clamped between 1 and 100. Defaults to 20.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Paginated collection of teams.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [ Teams ]
      summary: Create a team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreTeamRequest'
      responses:
        '201':
          description: Team created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
  /teams/{team}:
    parameters:
      - $ref: '#/components/parameters/TeamId'
    get:
      tags: [ Teams ]
      summary: Get a team
      responses:
        '200':
          description: The requested team, with members loaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [ Teams ]
      summary: Update a team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTeamRequest'
      responses:
        '200':
          description: Updated team.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [ Teams ]
      summary: Delete a team
      responses:
        '204':
          description: Team deleted. No content.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /teams/{team}/members:
    parameters:
      - $ref: '#/components/parameters/TeamId'
    get:
      tags: [ Team Members ]
      summary: List team members
      responses:
        '200':
          description: Collection of team members.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMemberCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [ Team Members ]
      summary: Invite a member to a team
      description: Invites or adds a user (identified by email) to the team with the
        given role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteMemberRequest'
      responses:
        '201':
          description: Member added.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMemberEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
  /teams/{team}/members/{user}:
    parameters:
      - $ref: '#/components/parameters/TeamId'
      - $ref: '#/components/parameters/UserId'
    patch:
      tags: [ Team Members ]
      summary: Update a team member role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTeamMemberRequest'
      responses:
        '200':
          description: Updated team member.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMemberEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [ Team Members ]
      summary: Remove a member from a team
      responses:
        '204':
          description: Member removed. No content.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /health:
    get:
      tags:
        - System
      summary: Health check
      description: Public liveness/health probe reporting status and basic runtime info.
      security: []
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /teams/{team}/projects:
    parameters:
      - $ref: "#/components/parameters/TeamId"
    get:
      tags:
        - Projects
      summary: List projects in a team
      description: >
        Returns a paginated list of projects within the team. Non-privileged
        users only see projects they are a member of.
      parameters:
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Paginated collection of projects.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectCollection"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags:
        - Projects
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreProjectRequest"
      responses:
        "201":
          description: Project created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
  /projects/{project}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags:
        - Projects
      summary: Get a project
      responses:
        "200":
          description: The requested project, with team and creator loaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Projects
      summary: Update a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Updated project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags:
        - Projects
      summary: Delete a project
      responses:
        "204":
          description: Project deleted. No content.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /projects/{project}/archive:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    post:
      tags:
        - Projects
      summary: Archive a project
      responses:
        "200":
          description: Archived project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /projects/{project}/restore:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    post:
      tags:
        - Projects
      summary: Restore an archived project
      responses:
        "200":
          description: Restored project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /projects/{project}/stats:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags:
        - Projects
      summary: Get project statistics
      description: Returns aggregated task counts by status and priority, completion
        percentage, overdue count and member count.
      responses:
        "200":
          description: Project statistics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectStatsEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /projects/{project}/members:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags:
        - Project Members
      summary: List project members
      responses:
        "200":
          description: Collection of project members.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMemberCollection"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags:
        - Project Members
      summary: Add a member to a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreProjectMemberRequest"
      responses:
        "201":
          description: Member added.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMemberEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
  /projects/{project}/members/{user}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/UserId"
    patch:
      tags:
        - Project Members
      summary: Update a project member role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectMemberRequest"
      responses:
        "200":
          description: Updated project member.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMemberEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags:
        - Project Members
      summary: Remove a member from a project
      responses:
        "204":
          description: Member removed. No content.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /projects/{project}/activity:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags:
        - Activity
      summary: List project activity
      parameters:
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Paginated collection of activity log entries for the project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityLogCollection"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /projects/{project}/labels:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags:
        - Labels
      summary: List project labels
      responses:
        "200":
          description: Collection of labels ordered by name.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LabelCollection"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags:
        - Labels
      summary: Create a label
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreLabelRequest"
      responses:
        "201":
          description: Label created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LabelEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
  /labels/{label}:
    parameters:
      - $ref: "#/components/parameters/LabelId"
    patch:
      tags:
        - Labels
      summary: Update a label
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLabelRequest"
      responses:
        "200":
          description: Updated label.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LabelEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags:
        - Labels
      summary: Delete a label
      responses:
        "204":
          description: Label deleted. No content.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /projects/{project}/tasks:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      tags:
        - Tasks
      summary: List tasks in a project
      description: Returns a paginated, filterable list of tasks for the project.
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - todo
              - in_progress
              - in_review
              - done
              - cancelled
        - name: priority
          in: query
          required: false
          schema:
            type: string
            enum:
              - low
              - medium
              - high
              - urgent
        - name: assignee_id
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: label_id
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: due_before
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: due_after
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: q
          in: query
          required: false
          description: Free-text search over title and description.
          schema:
            type: string
            maxLength: 255
        - name: overdue
          in: query
          required: false
          schema:
            type: boolean
        - name: parent_id
          in: query
          required: false
          description: Filter to subtasks of the given task.
          schema:
            type: integer
            format: int64
        - name: root
          in: query
          required: false
          description: When true, only top-level tasks (no parent) are returned.
          schema:
            type: boolean
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum:
              - created_at
              - due_date
              - priority
              - position
              - title
            default: position
        - name: dir
          in: query
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
            default: asc
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Paginated collection of tasks (list representation).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskListCollection"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
    post:
      tags:
        - Tasks
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreTaskRequest"
      responses:
        "201":
          description: Task created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
  /tasks/{task}:
    parameters:
      - $ref: "#/components/parameters/TaskId"
    get:
      tags:
        - Tasks
      summary: Get a task
      responses:
        "200":
          description: The requested task, with relationships loaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags:
        - Tasks
      summary: Update a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskRequest"
      responses:
        "200":
          description: Updated task.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
