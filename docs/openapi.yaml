      responses:
        '200':
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /search:
    get:
      tags: [Search]
      summary: Search projects, tasks and comments
      parameters:
        - name: q
          in: query
          required: true
          description: Search query (2-255 characters)
          schema:
            type: string
            minLength: 2
            maxLength: 255
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: "API token issued by register/login. Send as: Authorization: Bearer <token>"
  parameters:
    PerPage:
      name: per_page
      in: query
      description: Items per page (1-100, default 20)
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    UserId:
      name: user
      in: path
      required: true
      schema:
        type: integer
    TeamId:
      name: team
      in: path
      required: true
      schema:
        type: integer
    ProjectId:
      name: project
      in: path
      required: true
      schema:
        type: integer
    TaskId:
      name: task
      in: path
      required: true
      schema:
        type: integer
  responses:
    Unauthorized:
      description: Unauthenticated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageResponse'
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
  schemas:
    MessageResponse:
      type: object
      properties:
        message:
          type: string
    ValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    PaginationLinks:
      type: object
      properties:
        first:
          type: string
          nullable: true
        last:
          type: string
          nullable: true
        prev:
          type: string
          nullable: true
        next:
          type: string
          nullable: true
    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
        from:
          type: integer
          nullable: true
        last_page:
          type: integer
        per_page:
          type: integer
        to:
          type: integer
          nullable: true
        total:
          type: integer
    TaskStatus:
      type: string
      enum: [todo, in_progress, in_review, done, cancelled]
    TaskPriority:
      type: string
      enum: [low, medium, high, urgent]
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
          description: Only present when the viewer is the user themselves or an admin
        role:
          type: string
          enum: [admin, member]
        avatar_url:
          type: string
          nullable: true
        timezone:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
    UserWrapper:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/User'
    UserCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        links:
          $ref: '#/components/schemas/PaginationLinks'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    AuthResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string
    Team:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        owner_id:
          type: integer
        owner:
          $ref: '#/components/schemas/User'
        members_count:
          type: integer
        projects_count:
          type: integer
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
    TeamWrapper:
