    parameters:
      - name: project
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [Tasks]
      summary: List tasks in a project
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [todo, in_progress, in_review, done, cancelled]
        - name: priority
          in: query
          schema:
            type: string
            enum: [low, medium, high, urgent]
        - name: assignee_id
          in: query
          schema:
            type: integer
        - name: label_id
          in: query
          schema:
            type: integer
        - name: due_before
          in: query
          schema:
            type: string
            format: date
        - name: due_after
          in: query
          schema:
            type: string
            format: date
        - name: q
          in: query
          description: Search term against title/description.
          schema:
            type: string
        - name: overdue
          in: query
          schema:
            type: boolean
        - name: parent_id
          in: query
          schema:
            type: integer
        - name: root
          in: query
          description: When true, only top-level (no parent) tasks.
          schema:
            type: boolean
        - name: sort
          in: query
          schema:
            type: string
            enum: [created_at, due_date, priority, position, title]
            default: position
        - name: dir
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
        - $ref: '#/components/parameters/PerPage'
        - $ref: '#/components/parameters/Page'
