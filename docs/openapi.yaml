    post:
      tags:
        - Comments
      summary: Add a comment to a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreCommentRequest"
      responses:
        "201":
          description: Comment created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
  /comments/{comment}:
    parameters:
      - $ref: "#/components/parameters/CommentId"
    patch:
      tags:
        - Comments
      summary: Update a comment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCommentRequest"
      responses:
        "200":
          description: Updated comment.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags:
        - Comments
      summary: Delete a comment
      responses:
        "204":
          description: Comment deleted. No content.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /tasks/{task}/attachments:
    parameters:
      - $ref: "#/components/parameters/TaskId"
    get:
      tags:
        - Attachments
      summary: List task attachments
      parameters:
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Paginated collection of attachments.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachmentCollection"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags:
        - Attachments
      summary: Upload an attachment to a task
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The file to upload. Maximum 20480 KB.
              required:
                - file
      responses:
        "201":
          description: Attachment created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttachmentEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
  /attachments/{attachment}/download:
    parameters:
      - $ref: "#/components/parameters/AttachmentId"
    get:
      tags:
        - Attachments
      summary: Download an attachment
      responses:
        "200":
          description: The attachment file stream.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /attachments/{attachment}:
    parameters:
      - $ref: "#/components/parameters/AttachmentId"
    delete:
      tags:
        - Attachments
      summary: Delete an attachment
      responses:
        "204":
          description: Attachment deleted. No content.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /notifications:
    get:
      tags:
        - Notifications
      summary: List notifications
      parameters:
        - name: unread
          in: query
          required: false
          description: When true, only unread notifications are returned.
          schema:
            type: boolean
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Paginated collection of notifications.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationCollection"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /notifications/read-all:
    post:
      tags:
        - Notifications
      summary: Mark all notifications as read
      responses:
        "200":
          description: Count of notifications marked read.
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
  /notifications/{notification}/read:
    parameters:
      - $ref: "#/components/parameters/NotificationId"
    post:
      tags:
        - Notifications
      summary: Mark a notification as read
      responses:
        "200":
          description: Updated notification.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /notifications/{notification}:
    parameters:
      - $ref: "#/components/parameters/NotificationId"
    delete:
      tags:
        - Notifications
      summary: Delete a notification
      responses:
        "204":
          description: Notification deleted. No content.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /activity:
    get:
      tags:
        - Activity
      summary: List activity feed
      description: >
        Returns a paginated activity feed scoped to the authenticated user's
        teams and projects (admins see everything). Supports filtering by team,
        project, causer and action.
      parameters:
        - name: team_id
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: project_id
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: causer_id
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: action
          in: query
          required: false
          schema:
            type: string
        - $ref: "#/components/parameters/PerPage"
      responses:
        "200":
          description: Paginated collection of activity log entries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityLogCollection"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /dashboard:
    get:
      tags:
        - Dashboard
      summary: Get dashboard data
      description: >
        Returns aggregated dashboard data for the authenticated user including
        task counts by status, upcoming tasks, overdue count and recent
        activity.
      responses:
        "200":
          description: Dashboard payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /search:
    get:
      tags:
        - Search
      summary: Cross-resource search
      description: Searches projects, tasks and comments accessible to the
        authenticated user.
      parameters:
        - name: q
          in: query
          required: true
          description: Search term (2-255 characters).
          schema:
            type: string
            minLength: 2
            maxLength: 255
      responses:
        "200":
          description: Search results grouped by resource type.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: "Send the API token as Authorization: Bearer <token>."
  parameters:
    UserId:
      name: user
      in: path
      required: true
      description: The user identifier.
      schema:
        type: integer
        format: int64
    TeamId:
      name: team
      in: path
      required: true
      description: The team identifier.
      schema:
        type: integer
        format: int64
    PerPage:
      name: per_page
      in: query
      required: false
      description: Page size, clamped between 1 and 100. Defaults to 20.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    ProjectId:
      name: project
      in: path
      required: true
      description: The project identifier.
      schema:
        type: integer
        format: int64
    TaskId:
      name: task
      in: path
      required: true
      description: The task identifier.
      schema:
        type: integer
        format: int64
    LabelId:
      name: label
      in: path
      required: true
      description: The label identifier.
      schema:
        type: integer
        format: int64
    CommentId:
      name: comment
      in: path
      required: true
      description: The comment identifier.
      schema:
        type: integer
        format: int64
    AttachmentId:
      name: attachment
      in: path
      required: true
      description: The attachment identifier.
      schema:
        type: integer
        format: int64
    NotificationId:
      name: notification
      in: path
      required: true
      description: The notification identifier.
      schema:
        type: integer
        format: int64
  responses:
    Unauthorized:
      description: Authentication is missing or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageResponse'
          example:
            message: Unauthenticated.
    Forbidden:
      description: The authenticated user is not authorized for this action.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageResponse'
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageResponse'
    ValidationError:
      description: The submitted data failed validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
  schemas:
    MessageResponse:
      type: object
      properties:
        message:
          type: string
    ValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    PaginationLinks:
      type: object
      properties:
        first:
          type: string
          nullable: true
        last:
          type: string
          nullable: true
        prev:
          type: string
          nullable: true
        next:
          type: string
          nullable: true
    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
        from:
          type: integer
          nullable: true
        last_page:
          type: integer
        path:
          type: string
        per_page:
          type: integer
        to:
          type: integer
          nullable: true
        total:
          type: integer
    User:
      type: object
      description: A user. The email field is only present when the requester is the
        user themselves or an admin.
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
          format: email
          description: Only included when the authenticated user may see this address.
        role:
          type: string
          enum: [ admin, member ]
        avatar_url:
          type: string
          nullable: true
        timezone:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
      required: [ id, name, role ]
    UserEnvelope:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/User'
    UserCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        links:
          $ref: '#/components/schemas/PaginationLinks'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    Team:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        owner_id:
          type: integer
          format: int64
          nullable: true
        owner:
          $ref: '#/components/schemas/User'
        members_count:
          type: integer
          description: Present when the members relationship count is loaded.
        projects_count:
          type: integer
          description: Present when the projects relationship count is loaded.
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
      required: [ id, name, slug ]
    TeamEnvelope:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Team'
    TeamCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Team'
        links:
          $ref: '#/components/schemas/PaginationLinks'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    TeamMember:
      type: object
      properties:
        id:
          type: integer
          format: int64
          nullable: true
        team_id:
          type: integer
          format: int64
          nullable: true
        user_id:
          type: integer
          format: int64
          nullable: true
        role:
          type: string
          enum: [ owner, admin, member ]
          nullable: true
        user:
          $ref: '#/components/schemas/User'
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
    TeamMemberEnvelope:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/TeamMember'
    TeamMemberCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TeamMember'
    AuthResponse:
      type: object
      description: Returned by register and login. Note the user is NOT wrapped in a
        data envelope here.
      properties:
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string
          description: API token to be presented as a bearer token on subsequent requests.
      required: [ user, token ]
    RegisterRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 255
          description: Must be unique among users.
        password:
          type: string
          minLength: 8
          maxLength: 255
      required: [ name, email, password ]
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
      required: [ email, password ]
    UpdateProfileRequest:
      type: object
      description: All fields optional; when present they must satisfy the listed
        constraints.
      properties:
        name:
          type: string
          maxLength: 255
        avatar_url:
          type: string
          maxLength: 2048
          nullable: true
        timezone:
          type: string
          maxLength: 64
    ChangePasswordRequest:
      type: object
      properties:
        current_password:
          type: string
        new_password:
          type: string
          minLength: 8
          maxLength: 255
          description: Must differ from the current password.
      required: [ current_password, new_password ]
    UpdateUserRequest:
      type: object
      description: All fields optional; when present they must satisfy the listed
        constraints.
      properties:
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 255
          description: Must be unique among users (ignoring the current user).
        role:
          type: string
          enum: [ admin, member ]
        avatar_url:
          type: string
          maxLength: 2048
          nullable: true
        timezone:
          type: string
          maxLength: 64
    StoreTeamRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        slug:
          type: string
          maxLength: 255
          pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
          description: Lowercase, hyphen-separated; must be unique.
        description:
          type: string
          nullable: true
      required: [ name, slug ]
    UpdateTeamRequest:
      type: object
      description: All fields optional; when present they must satisfy the listed
        constraints.
      properties:
        name:
          type: string
          maxLength: 255
        slug:
          type: string
          maxLength: 255
          pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
          description: Lowercase, hyphen-separated; must be unique (ignoring the current
            team).
        description:
          type: string
          nullable: true
    InviteMemberRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        role:
          type: string
          enum: [ owner, admin, member ]
      required: [ email, role ]
    UpdateTeamMemberRequest:
      type: object
      properties:
        role:
          type: string
          enum: [ owner, admin, member ]
      required: [ role ]
    HealthResponse:
      type: object
      properties:
