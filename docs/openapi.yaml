      parameters:
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated activity logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityLogCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /tasks/{task}/comments:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    get:
      tags: [Comments]
      summary: List comments on a task
      parameters:
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated comments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Comments]
      summary: Add a comment to a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreCommentRequest'
      responses:
        '201':
          description: Created comment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentWrapper'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
  /comments/{comment}:
    parameters:
      - name: comment
        in: path
        required: true
        schema:
          type: integer
    patch:
      tags: [Comments]
      summary: Update a comment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCommentRequest'
      responses:
        '200':
          description: Updated comment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentWrapper'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Comments]
      summary: Delete a comment
      responses:
        '204':
          description: Deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /tasks/{task}/attachments:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    get:
      tags: [Attachments]
      summary: List attachments on a task
      parameters:
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated attachments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttachmentCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Attachments]
      summary: Upload an attachment to a task
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: File to upload (max 20MB)
      responses:
        '201':
          description: Created attachment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttachmentWrapper'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
  /attachments/{attachment}/download:
    parameters:
      - name: attachment
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [Attachments]
      summary: Download an attachment
      responses:
        '200':
          description: File stream
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /attachments/{attachment}:
    parameters:
      - name: attachment
        in: path
        required: true
        schema:
          type: integer
    delete:
      tags: [Attachments]
      summary: Delete an attachment
      responses:
        '204':
          description: Deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /notifications:
    get:
      tags: [Notifications]
      summary: List the authenticated user's notifications
      parameters:
        - name: unread
          in: query
          description: When true, only return unread notifications
          schema:
            type: boolean
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated notifications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /notifications/read-all:
    post:
      tags: [Notifications]
      summary: Mark all notifications as read
      responses:
        '200':
          description: Number of notifications updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
  /notifications/{notification}/read:
    parameters:
      - name: notification
        in: path
        required: true
        schema:
          type: integer
    post:
      tags: [Notifications]
      summary: Mark a notification as read
      responses:
        '200':
          description: Updated notification
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationWrapper'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /notifications/{notification}:
    parameters:
      - name: notification
        in: path
        required: true
        schema:
          type: integer
    delete:
      tags: [Notifications]
      summary: Delete a notification
      responses:
        '204':
          description: Deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /activity:
    get:
      tags: [Activity]
      summary: List activity logs visible to the authenticated user
      parameters:
        - name: team_id
          in: query
          schema:
            type: integer
        - name: project_id
          in: query
          schema:
            type: integer
        - name: causer_id
          in: query
          schema:
            type: integer
        - name: action
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated activity logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityLogCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /dashboard:
    get:
