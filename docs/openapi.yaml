openapi: 3.1.0
info:
  title: Users & Teams API
  version: 1.0.0
  description: >
    OpenAPI specification covering the authentication, user, team and
    team-member surface of the application. The API is token based: clients
    obtain a token via register/login and present it on subsequent requests.
servers:
  - url: /api
    description: API root (routes registered under the api prefix)
tags:
  - name: Auth
    description: Authentication and current-user profile management.
  - name: Users
    description: User listing and administration.
  - name: Teams
    description: Team CRUD operations.
  - name: Team Members
    description: Management of members within a team.
security:
  - bearerAuth: []
paths:
  /auth/register:
    post:
      tags: [ Auth ]
      summary: Register a new user
      description: Creates a user account and returns the user together with an API token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /auth/login:
    post:
      tags: [ Auth ]
      summary: Log in
      description: Validates credentials and returns the user together with a fresh
        API token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /auth/logout:
    post:
      tags: [ Auth ]
      summary: Log out
      description: Revokes the current API token for the authenticated user.
      responses:
        '204':
          description: Token revoked. No content.
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/me:
    get:
      tags: [ Auth ]
      summary: Get the authenticated user
      responses:
        '200':
          description: The current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/profile:
    patch:
      tags: [ Auth ]
      summary: Update the authenticated user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Updated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /auth/password:
    post:
      tags: [ Auth ]
      summary: Change the authenticated user password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          description: Password changed. No content.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /users:
    get:
      tags: [ Users ]
      summary: List users
      description: Returns a paginated list of users. Supports a free-text query over
        name and email.
      parameters:
        - name: q
          in: query
          required: false
          description: Free-text search applied to the user name and email.
          schema:
            type: string
        - name: per_page
          in: query
          required: false
          description: Page size, clamped between 1 and 100. Defaults to 20.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Paginated collection of users.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /users/{user}:
    parameters:
      - $ref: '#/components/parameters/UserId'
    get:
      tags: [ Users ]
      summary: Get a user
      responses:
        '200':
          description: The requested user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [ Users ]
      summary: Update a user
      description: "Administrative operation: requires the admin role."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Updated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [ Users ]
      summary: Delete a user
      description: "Administrative operation: requires the admin role."
      responses:
        '204':
          description: User deleted. No content.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /teams:
    get:
      tags: [ Teams ]
      summary: List teams
      description: Returns a paginated list of teams the authenticated user belongs to.
      parameters:
        - name: per_page
          in: query
          required: false
          description: Page size, clamped between 1 and 100. Defaults to 20.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Paginated collection of teams.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [ Teams ]
      summary: Create a team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreTeamRequest'
      responses:
        '201':
          description: Team created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
  /teams/{team}:
    parameters:
      - $ref: '#/components/parameters/TeamId'
    get:
      tags: [ Teams ]
      summary: Get a team
      responses:
        '200':
          description: The requested team, with members loaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [ Teams ]
      summary: Update a team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTeamRequest'
      responses:
        '200':
          description: Updated team.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [ Teams ]
      summary: Delete a team
      responses:
        '204':
          description: Team deleted. No content.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /teams/{team}/members:
    parameters:
      - $ref: '#/components/parameters/TeamId'
    get:
      tags: [ Team Members ]
      summary: List team members
      responses:
        '200':
          description: Collection of team members.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMemberCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [ Team Members ]
      summary: Invite a member to a team
      description: Invites or adds a user (identified by email) to the team with the
        given role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteMemberRequest'
      responses:
        '201':
          description: Member added.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMemberEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
  /teams/{team}/members/{user}:
    parameters:
      - $ref: '#/components/parameters/TeamId'
      - $ref: '#/components/parameters/UserId'
    patch:
      tags: [ Team Members ]
      summary: Update a team member role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTeamMemberRequest'
      responses:
        '200':
          description: Updated team member.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMemberEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [ Team Members ]
      summary: Remove a member from a team
      responses:
        '204':
          description: Member removed. No content.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: >
        Public health-check endpoint. Returns service status, current timestamp,
        the Laravel framework version, and the default database connection name.
      security: []
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: "Send the API token as Authorization: Bearer <token>."
  parameters:
    UserId:
      name: user
      in: path
      required: true
      description: The user identifier.
      schema:
        type: integer
        format: int64
    TeamId:
      name: team
      in: path
      required: true
      description: The team identifier.
      schema:
        type: integer
        format: int64
  responses:
    Unauthorized:
      description: Authentication is missing or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageResponse'
          example:
            message: Unauthenticated.
    Forbidden:
      description: The authenticated user is not authorized for this action.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageResponse'
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageResponse'
    ValidationError:
      description: The submitted data failed validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
  schemas:
    MessageResponse:
      type: object
      properties:
        message:
          type: string
    ValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    PaginationLinks:
      type: object
      properties:
        first:
          type: string
          nullable: true
        last:
          type: string
          nullable: true
        prev:
          type: string
          nullable: true
        next:
          type: string
          nullable: true
    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
        from:
          type: integer
          nullable: true
        last_page:
          type: integer
        path:
          type: string
        per_page:
          type: integer
        to:
          type: integer
          nullable: true
        total:
          type: integer
    User:
      type: object
      description: A user. The email field is only present when the requester is the
        user themselves or an admin.
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
          format: email
          description: Only included when the authenticated user may see this address.
        role:
          type: string
          enum: [ admin, member ]
        avatar_url:
          type: string
          nullable: true
        timezone:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
      required: [ id, name, role ]
    UserEnvelope:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/User'
    UserCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        links:
          $ref: '#/components/schemas/PaginationLinks'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    Team:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        owner_id:
          type: integer
          format: int64
          nullable: true
        owner:
          $ref: '#/components/schemas/User'
        members_count:
          type: integer
          description: Present when the members relationship count is loaded.
        projects_count:
          type: integer
          description: Present when the projects relationship count is loaded.
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
      required: [ id, name, slug ]
    TeamEnvelope:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Team'
    TeamCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Team'
        links:
          $ref: '#/components/schemas/PaginationLinks'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    TeamMember:
      type: object
      properties:
        id:
          type: integer
          format: int64
          nullable: true
        team_id:
          type: integer
          format: int64
          nullable: true
        user_id:
          type: integer
          format: int64
          nullable: true
        role:
          type: string
          enum: [ owner, admin, member ]
          nullable: true
        user:
          $ref: '#/components/schemas/User'
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
    TeamMemberEnvelope:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/TeamMember'
    TeamMemberCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TeamMember'
    AuthResponse:
      type: object
      description: Returned by register and login. Note the user is NOT wrapped in a
        data envelope here.
      properties:
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string
          description: API token to be presented as a bearer token on subsequent requests.
      required: [ user, token ]
    RegisterRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 255
          description: Must be unique among users.
        password:
          type: string
          minLength: 8
          maxLength: 255
      required: [ name, email, password ]
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
      required: [ email, password ]
    UpdateProfileRequest:
      type: object
      description: All fields optional; when present they must satisfy the listed
        constraints.
      properties:
        name:
          type: string
          maxLength: 255
        avatar_url:
          type: string
          maxLength: 2048
          nullable: true
        timezone:
          type: string
          maxLength: 64
    ChangePasswordRequest:
      type: object
      properties:
        current_password:
          type: string
        new_password:
          type: string
          minLength: 8
          maxLength: 255
          description: Must differ from the current password.
      required: [ current_password, new_password ]
    UpdateUserRequest:
      type: object
      description: All fields optional; when present they must satisfy the listed
        constraints.
      properties:
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 255
          description: Must be unique among users (ignoring the current user).
        role:
          type: string
          enum: [ admin, member ]
        avatar_url:
          type: string
          maxLength: 2048
          nullable: true
        timezone:
          type: string
          maxLength: 64
    StoreTeamRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        slug:
          type: string
          maxLength: 255
          pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
          description: Lowercase, hyphen-separated; must be unique.
        description:
          type: string
          nullable: true
      required: [ name, slug ]
    UpdateTeamRequest:
      type: object
      description: All fields optional; when present they must satisfy the listed
        constraints.
      properties:
        name:
          type: string
          maxLength: 255
        slug:
          type: string
          maxLength: 255
          pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
          description: Lowercase, hyphen-separated; must be unique (ignoring the current
            team).
        description:
          type: string
          nullable: true
    InviteMemberRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        role:
          type: string
          enum: [ owner, admin, member ]
      required: [ email, role ]
    UpdateTeamMemberRequest:
      type: object
      properties:
        role:
          type: string
          enum: [ owner, admin, member ]
      required: [ role ]
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        timestamp:
          type: string
          format: date-time
          description: Current server time in ISO 8601 format.
        laravel_version:
          type: string
          description: The running Laravel framework version.
        database:
          type: string
          description: The name of the default database connection.
      required:
        - status
        - timestamp
        - laravel_version
        - database
