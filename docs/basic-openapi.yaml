openapi: 3.1.0
info:
  title: Task Manager API — Users
  version: 1.0.0
  description: >-
    User-focused slice of the Task Manager API. Covers authentication, the
    current-user profile, password management, and user administration.
    Team, project, task, and related endpoints are intentionally out of scope
    for this document.
servers:
  - url: /api
    description: API base path
tags:
  - name: Auth
    description: Registration, login, session, and profile management.
  - name: Users
    description: User listing and administration.
security:
  - bearerAuth: []
paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      description: Creates a new user account and returns the user along with an API token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /auth/login:
    post:
      tags: [Auth]
      summary: Log in
      description: Authenticates a user by email and password and returns a new API token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /auth/logout:
    post:
      tags: [Auth]
      summary: Log out
      description: Revokes the current API token for the authenticated user.
      responses:
        '204':
          description: Logged out (no content).
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/me:
    get:
      tags: [Auth]
      summary: Get the authenticated user
      responses:
        '200':
          description: The current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/profile:
    patch:
      tags: [Auth]
      summary: Update the authenticated user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Updated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /auth/password:
    post:
      tags: [Auth]
      summary: Change the authenticated user's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          description: Password changed (no content).
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /users:
    get:
      tags: [Users]
      summary: List users
      description: Returns a paginated list of users, optionally filtered by a search term.
      parameters:
        - name: q
          in: query
          description: Search term matched against user name and email.
          required: false
          schema:
            type: string
        - name: per_page
          in: query
          description: Number of results per page (1-100, default 20).
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Paginated list of users.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /users/{user}:
    parameters:
      - $ref: '#/components/parameters/UserId'
    get:
      tags: [Users]
      summary: Get a user
      responses:
        '200':
          description: The requested user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Users]
      summary: Update a user
      description: Updates a user. Requires the admin role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Updated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Users]
      summary: Delete a user
      description: Deletes a user. Requires the admin role.
      responses:
        '204':
          description: User deleted (no content).
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: "API token issued at login/register. Send it as the header: Authorization: Bearer <token>"
  parameters:
    UserId:
      name: user
      in: path
      required: true
      description: User identifier.
      schema:
        type: integer
        format: int64
  responses:
    Unauthorized:
      description: Authentication is required or the token is invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageResponse'
          example:
            message: Unauthenticated.
    Forbidden:
      description: The authenticated user is not allowed to perform this action.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageResponse'
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageResponse'
    ValidationError:
      description: The request failed validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
  schemas:
    User:
      type: object
      description: A user account. The email is only present when the requester is the user themselves or an admin.
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
          format: email
          description: Only included for the user themselves or for admins.
        role:
          type: string
          enum: [admin, member]
        avatar_url:
          type: [string, 'null']
        timezone:
          type: [string, 'null']
        created_at:
          type: [string, 'null']
          format: date-time
      required: [id, name, role]
    UserEnvelope:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/User'
      required: [data]
    UserCollection:
      type: object
      description: Paginated collection of users (Laravel resource collection format).
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        links:
          $ref: '#/components/schemas/PaginationLinks'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
      required: [data]
    PaginationLinks:
      type: object
      properties:
        first:
          type: [string, 'null']
        last:
          type: [string, 'null']
        prev:
          type: [string, 'null']
        next:
          type: [string, 'null']
    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
        from:
          type: [integer, 'null']
        last_page:
          type: integer
        path:
          type: string
        per_page:
          type: integer
        to:
          type: [integer, 'null']
        total:
          type: integer
    AuthResponse:
      type: object
      description: Authentication payload containing the user and a freshly issued API token.
      properties:
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string
          description: API token to be sent as a bearer token on subsequent requests.
      required: [user, token]
    RegisterRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 255
          description: Must be unique.
        password:
          type: string
          minLength: 8
          maxLength: 255
      required: [name, email, password]
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
      required: [email, password]
    UpdateProfileRequest:
      type: object
      description: All fields are optional; only provided fields are updated.
      properties:
        name:
          type: string
          maxLength: 255
        avatar_url:
          type: [string, 'null']
          maxLength: 2048
        timezone:
          type: string
          maxLength: 64
      additionalProperties: false
    ChangePasswordRequest:
      type: object
      properties:
        current_password:
          type: string
        new_password:
          type: string
          minLength: 8
          maxLength: 255
          description: Must be different from the current password.
      required: [current_password, new_password]
    UpdateUserRequest:
      type: object
      description: All fields are optional; only provided fields are updated.
      properties:
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 255
          description: Must be unique across users.
        role:
          type: string
          enum: [admin, member]
        avatar_url:
          type: [string, 'null']
          maxLength: 2048
        timezone:
          type: string
          maxLength: 64
      additionalProperties: false
    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]
    ValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
      required: [message, errors]
