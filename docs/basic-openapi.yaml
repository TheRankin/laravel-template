openapi: 3.1.0
info:
  title: Users & Teams API
  version: 1.0.0
  description: |
    HTTP API surface covering user management and team management
    (including team membership) for the application. All endpoints
    require token-based authentication unless otherwise noted.
servers:
  - url: /api
    description: API root
security:
  - bearerAuth: []
tags:
  - name: Users
    description: User listing and management.
  - name: Teams
    description: Team creation and management.
  - name: Team Members
    description: Management of membership within a team.
paths:
  /users:
    get:
      tags: [Users]
      summary: List users
      description: Returns a paginated list of users. Supports a free-text search filter.
      operationId: listUsers
      parameters:
        - name: q
          in: query
          required: false
          description: Free-text filter matched against user name and email.
          schema:
            type: string
        - name: per_page
          in: query
          required: false
          description: Items per page (clamped between 1 and 100).
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: page
          in: query
          required: false
          description: Page number to retrieve.
          schema:
            type: integer
            minimum: 1
            default: 1
      responses:
        '200':
          description: A paginated collection of users.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /users/{user}:
    parameters:
      - $ref: '#/components/parameters/UserId'
    get:
      tags: [Users]
      summary: Get a user
      description: Retrieve a single user by ID.
      operationId: getUser
      responses:
        '200':
          description: The requested user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Users]
      summary: Update a user
      description: Update a user. Requires the authenticated user to have the admin role.
      operationId: updateUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: The updated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Users]
      summary: Delete a user
      description: Delete a user. Requires the authenticated user to have the admin role.
      operationId: deleteUser
      responses:
        '204':
          description: User deleted successfully.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /teams:
    get:
      tags: [Teams]
      summary: List teams
      description: Returns a paginated list of teams the authenticated user belongs to.
      operationId: listTeams
      parameters:
        - name: per_page
          in: query
          required: false
          description: Items per page (clamped between 1 and 100).
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: page
          in: query
          required: false
          description: Page number to retrieve.
          schema:
            type: integer
            minimum: 1
            default: 1
      responses:
        '200':
          description: A paginated collection of teams.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Teams]
      summary: Create a team
      description: Create a new team owned by the authenticated user.
      operationId: createTeam
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreTeamRequest'
      responses:
        '201':
          description: The created team.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
  /teams/{team}:
    parameters:
      - $ref: '#/components/parameters/TeamId'
    get:
      tags: [Teams]
      summary: Get a team
      description: Retrieve a single team, including its members.
      operationId: getTeam
      responses:
        '200':
          description: The requested team.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Teams]
      summary: Update a team
      description: Update a team. Requires authorization on the team.
      operationId: updateTeam
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTeamRequest'
      responses:
        '200':
          description: The updated team.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Teams]
      summary: Delete a team
      description: Delete a team. Requires authorization on the team.
      operationId: deleteTeam
      responses:
        '204':
          description: Team deleted successfully.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /teams/{team}/members:
    parameters:
      - $ref: '#/components/parameters/TeamId'
    get:
      tags: [Team Members]
      summary: List team members
      description: List all members of a team.
      operationId: listTeamMembers
      responses:
        '200':
          description: The list of team members.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMemberCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [Team Members]
      summary: Invite a team member
      description: Invite a member to the team by email and assign a role.
      operationId: inviteTeamMember
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteMemberRequest'
      responses:
        '201':
          description: The newly added team member.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMemberEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
  /teams/{team}/members/{user}:
    parameters:
      - $ref: '#/components/parameters/TeamId'
      - $ref: '#/components/parameters/UserId'
    patch:
      tags: [Team Members]
      summary: Update a team member role
      description: Update the role of a member within the team.
      operationId: updateTeamMember
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMemberRequest'
      responses:
        '200':
          description: The updated team member.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMemberEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Team Members]
      summary: Remove a team member
      description: Remove a member from the team.
      operationId: removeTeamMember
      responses:
        '204':
          description: Team member removed successfully.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: "Send the API token as Authorization: Bearer <token>."
  parameters:
    UserId:
      name: user
      in: path
      required: true
      description: The user ID.
      schema:
        type: integer
    TeamId:
      name: team
      in: path
      required: true
      description: The team ID.
      schema:
        type: integer
  responses:
    Unauthorized:
      description: Authentication token missing or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageResponse'
          example:
            message: Unauthenticated.
    Forbidden:
      description: The authenticated user is not permitted to perform this action.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageResponse'
          example:
            message: Forbidden.
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageResponse'
    ValidationError:
      description: The submitted data failed validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
  schemas:
    MessageResponse:
      type: object
      properties:
        message:
          type: string
    ValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    PaginationLinks:
      type: object
      properties:
        first:
          type: string
          nullable: true
        last:
          type: string
          nullable: true
        prev:
          type: string
          nullable: true
        next:
          type: string
          nullable: true
    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
        from:
          type: integer
          nullable: true
        last_page:
          type: integer
        path:
          type: string
        per_page:
          type: integer
        to:
          type: integer
          nullable: true
        total:
          type: integer
    User:
      type: object
      description: A user. The email field is only present when the requester may view it (self or admin).
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
          description: Present only for the user themselves or for admins.
        role:
          type: string
          enum: [admin, member]
        avatar_url:
          type: string
          nullable: true
        timezone:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
      required: [id, name, role]
    UserEnvelope:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/User'
      required: [data]
    UserCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        links:
          $ref: '#/components/schemas/PaginationLinks'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
      required: [data]
    UpdateUserRequest:
      type: object
      description: All fields are optional; provided fields are validated.
      properties:
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 255
          description: Must be unique across users.
        role:
          type: string
          enum: [admin, member]
        avatar_url:
          type: string
          maxLength: 2048
          nullable: true
        timezone:
          type: string
          maxLength: 64
    Team:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        owner_id:
          type: integer
        owner:
          $ref: '#/components/schemas/User'
        members_count:
          type: integer
          description: Present when the members relationship count is loaded.
        projects_count:
          type: integer
          description: Present when the projects relationship count is loaded.
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
      required: [id, name, slug, owner_id]
    TeamEnvelope:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Team'
      required: [data]
    TeamCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Team'
        links:
          $ref: '#/components/schemas/PaginationLinks'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
      required: [data]
    StoreTeamRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        slug:
          type: string
          maxLength: 255
          description: "Lowercase alphanumeric words separated by hyphens; must be unique."
          pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
        description:
          type: string
          nullable: true
      required: [name, slug]
    UpdateTeamRequest:
      type: object
      description: All fields are optional; provided fields are validated.
      properties:
        name:
          type: string
          maxLength: 255
        slug:
          type: string
          maxLength: 255
          description: "Lowercase alphanumeric words separated by hyphens; must be unique."
          pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$'
        description:
          type: string
          nullable: true
    TeamMember:
      type: object
      properties:
        id:
          type: integer
        team_id:
          type: integer
          nullable: true
        user_id:
          type: integer
          nullable: true
        role:
          type: string
          enum: [owner, admin, member]
          nullable: true
        user:
          $ref: '#/components/schemas/User'
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
      required: [id]
    TeamMemberEnvelope:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/TeamMember'
      required: [data]
    TeamMemberCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TeamMember'
      required: [data]
    InviteMemberRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        role:
          type: string
          enum: [owner, admin, member]
      required: [email, role]
    UpdateMemberRequest:
      type: object
      properties:
        role:
          type: string
          enum: [owner, admin, member]
      required: [role]
