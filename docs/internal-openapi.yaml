openapi: 3.1.0
info:
  title: Internal Project Management API
  version: 1.0.0
  description: >
    Internal OpenAPI specification covering the authentication, project, task,
    label, comment, attachment, notification, activity, dashboard and search
    surface of the application. The API is token based: clients obtain a token
    via register/login and present it on subsequent requests as a bearer token.
    User and Team management endpoints are documented separately and are out of
    scope for this spec.
servers:
  - url: /api
    description: API root (routes registered under the api prefix)
tags:
  - name: Auth
    description: Authentication and current-user profile management.
  - name: Health
    description: Service health probe.
  - name: Projects
    description: Project CRUD, archive/restore and statistics.
  - name: Project Members
    description: Management of members within a project.
  - name: Labels
    description: Project-scoped labels.
  - name: Tasks
    description: Task CRUD, assignment, status, priority, labels, subtasks and ordering.
  - name: Comments
    description: Task comments.
  - name: Attachments
    description: Task file attachments.
  - name: Notifications
    description: Per-user notifications.
  - name: Activity
    description: Activity log feeds.
  - name: Dashboard
    description: Authenticated user dashboard.
  - name: Search
    description: Cross-resource search.
security:
  - bearerAuth: []
paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: |
        Returns the service status along with runtime metadata (timestamp,
        application version and PHP version). No authentication required.
      security: []
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
                    description: ISO 8601 timestamp of when the probe was served.
                  app_version:
                    type: string
                    description: Application version (from app.version config). May be null when
                      unset.
                    nullable: true
                    example: 1.0.0
                  php_version:
                    type: string
                    description: The PHP runtime version.
                    example: 8.3.0
                required:
                  - status
                  - timestamp
                  - app_version
                  - php_version
  /auth/register:
    post:
      tags: [ Auth ]
      summary: Register a new user
      description: Creates a user account and returns the user together with an API token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /auth/login:
    post:
      tags: [ Auth ]
      summary: Log in
      description: Validates credentials and returns the user together with a fresh
        API token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
  /auth/logout:
    post:
      tags: [ Auth ]
      summary: Log out
      description: Revokes the current API token for the authenticated user.
      responses:
        '204':
          description: Token revoked. No content.
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/me:
    get:
      tags: [ Auth ]
      summary: Get the authenticated user
      responses:
        '200':
          description: The current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/profile:
    patch:
      tags: [ Auth ]
      summary: Update the authenticated user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Updated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /auth/password:
    post:
      tags: [ Auth ]
      summary: Change the authenticated user password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          description: Password changed. No content.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /teams/{team}/projects:
    parameters:
      - $ref: '#/components/parameters/TeamId'
    get:
      tags: [ Projects ]
      summary: List projects for a team
      description: Returns a paginated list of projects in the team that the
        authenticated user may view.
      parameters:
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated collection of projects.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [ Projects ]
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreProjectRequest'
      responses:
        '201':
          description: Project created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
  /projects/{project}:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [ Projects ]
      summary: Get a project
      responses:
        '200':
          description: The requested project, with team and creator loaded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [ Projects ]
      summary: Update a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: Updated project.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [ Projects ]
      summary: Delete a project
      responses:
        '204':
          description: Project deleted. No content.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{project}/archive:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    post:
      tags: [ Projects ]
      summary: Archive a project
      description: Sets the project status to archived.
      responses:
        '200':
          description: Archived project.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{project}/restore:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    post:
      tags: [ Projects ]
      summary: Restore a project
      description: Sets the project status back to active.
      responses:
        '200':
          description: Restored project.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /projects/{project}/stats:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [ Projects ]
      summary: Get project statistics
      responses:
        '200':
          description: Aggregated task statistics for the project.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectStatsEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{project}/members:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [ Project Members ]
      summary: List project members
      responses:
        '200':
          description: Collection of project members.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectMemberCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [ Project Members ]
      summary: Add a member to a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreProjectMemberRequest'
      responses:
        '201':
          description: Member added.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectMemberEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
  /projects/{project}/members/{user}:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/UserId'
    patch:
      tags: [ Project Members ]
      summary: Update a project member role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectMemberRequest'
      responses:
        '200':
          description: Updated project member.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectMemberEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [ Project Members ]
      summary: Remove a member from a project
      description: >
        Removes a member from the project. The only remaining lead cannot be
        removed; attempting to do so yields a validation error.
      responses:
        '204':
          description: Member removed. No content.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  /projects/{project}/activity:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [ Activity ]
      summary: List activity for a project
      parameters:
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated collection of activity log entries for the project.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityLogCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{project}/labels:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [ Labels ]
      summary: List project labels
      responses:
        '200':
          description: Collection of labels ordered by name.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabelCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [ Labels ]
      summary: Create a label
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreLabelRequest'
      responses:
        '201':
          description: Label created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabelEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
  /labels/{label}:
    parameters:
      - $ref: '#/components/parameters/LabelId'
    patch:
      tags: [ Labels ]
      summary: Update a label
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLabelRequest'
      responses:
        '200':
          description: Updated label.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabelEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [ Labels ]
      summary: Delete a label
      responses:
        '204':
          description: Label deleted. No content.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{project}/tasks:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [ Tasks ]
      summary: List tasks in a project
      description: Returns a paginated list of tasks with rich filtering, sorting and
        search.
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/TaskStatus'
        - name: priority
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/TaskPriority'
        - name: assignee_id
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: label_id
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: due_before
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: due_after
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: q
          in: query
          required: false
          description: Free-text search applied to task title and description.
          schema:
            type: string
            maxLength: 255
        - name: overdue
          in: query
          required: false
          schema:
            type: boolean
        - name: parent_id
          in: query
          required: false
          description: Filter to subtasks of the given parent task.
          schema:
            type: integer
            format: int64
        - name: root
          in: query
          required: false
          description: When true, returns only top-level tasks (no parent).
          schema:
            type: boolean
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [ created_at, due_date, priority, position, title ]
            default: position
        - name: dir
          in: query
          required: false
          schema:
            type: string
            enum: [ asc, desc ]
            default: asc
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated collection of tasks.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    post:
      tags: [ Tasks ]
      summary: Create a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreTaskRequest'
      responses:
        '201':
          description: Task created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
  /tasks/{task}:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    get:
      tags: [ Tasks ]
      summary: Get a task
      responses:
        '200':
          description: The requested task.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [ Tasks ]
      summary: Update a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: Updated task.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [ Tasks ]
      summary: Delete a task
      responses:
        '204':
          description: Task deleted. No content.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /tasks/{task}/assign:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    post:
      tags: [ Tasks ]
      summary: Assign a task to a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignTaskRequest'
      responses:
        '200':
          description: Updated task.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
  /tasks/{task}/unassign:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    post:
      tags: [ Tasks ]
      summary: Unassign a task
      responses:
        '200':
          description: Updated task with no assignee.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /tasks/{task}/status:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    post:
      tags: [ Tasks ]
      summary: Transition task status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitionStatusRequest'
      responses:
        '200':
          description: Updated task.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
  /tasks/{task}/priority:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    post:
      tags: [ Tasks ]
      summary: Update task priority
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePriorityRequest'
      responses:
        '200':
          description: Updated task.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
  /tasks/{task}/labels:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    post:
      tags: [ Tasks ]
      summary: Sync task labels
      description: Replaces the set of labels attached to the task with the provided ids.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyncLabelsRequest'
      responses:
        '200':
          description: Updated task.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
  /tasks/{task}/subtasks:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    get:
      tags: [ Tasks ]
      summary: List subtasks of a task
      responses:
        '200':
          description: Collection of subtasks ordered by position.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListCollectionSimple'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [ Tasks ]
      summary: Create a subtask
      description: Creates a task whose parent is the referenced task.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreTaskRequest'
      responses:
        '201':
          description: Subtask created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
  /tasks/{task}/reorder:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    post:
      tags: [ Tasks ]
      summary: Reorder a task
      description: Moves the task to the given zero-based position within its sibling set.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderTaskRequest'
      responses:
        '200':
          description: Updated task.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
  /tasks/{task}/activity:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    get:
      tags: [ Activity ]
      summary: List activity for a task
      parameters:
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated collection of activity log entries for the task.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityLogCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /tasks/{task}/comments:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    get:
      tags: [ Comments ]
      summary: List comments for a task
      parameters:
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated collection of comments.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [ Comments ]
      summary: Create a comment on a task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreCommentRequest'
      responses:
        '201':
          description: Comment created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
  /comments/{comment}:
    parameters:
      - $ref: '#/components/parameters/CommentId'
    patch:
      tags: [ Comments ]
      summary: Update a comment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCommentRequest'
      responses:
        '200':
          description: Updated comment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [ Comments ]
      summary: Delete a comment
      responses:
        '204':
          description: Comment deleted. No content.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /tasks/{task}/attachments:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    get:
      tags: [ Attachments ]
      summary: List attachments for a task
      parameters:
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated collection of attachments.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttachmentCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [ Attachments ]
      summary: Upload an attachment to a task
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The file to upload. Maximum size 20480 KB.
              required: [ file ]
      responses:
        '201':
          description: Attachment created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttachmentEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
  /attachments/{attachment}/download:
    parameters:
      - $ref: '#/components/parameters/AttachmentId'
    get:
      tags: [ Attachments ]
      summary: Download an attachment
      responses:
        '200':
          description: The attachment file stream.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /attachments/{attachment}:
    parameters:
      - $ref: '#/components/parameters/AttachmentId'
    delete:
      tags: [ Attachments ]
      summary: Delete an attachment
      responses:
        '204':
          description: Attachment deleted. No content.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /notifications:
    get:
      tags: [ Notifications ]
      summary: List notifications
      description: Returns the authenticated user's notifications, most recent first.
      parameters:
        - name: unread
          in: query
          required: false
          description: When true, returns only unread notifications.
          schema:
            type: boolean
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated collection of notifications.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /notifications/read-all:
    post:
      tags: [ Notifications ]
      summary: Mark all notifications as read
      responses:
        '200':
          description: Number of notifications updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
  /notifications/{notification}/read:
    parameters:
      - $ref: '#/components/parameters/NotificationId'
    post:
      tags: [ Notifications ]
      summary: Mark a notification as read
      responses:
        '200':
          description: The updated notification.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /notifications/{notification}:
    parameters:
      - $ref: '#/components/parameters/NotificationId'
    delete:
      tags: [ Notifications ]
      summary: Delete a notification
      responses:
        '204':
          description: Notification deleted. No content.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /activity:
    get:
      tags: [ Activity ]
      summary: List global activity
      description: >
        Returns a paginated activity feed scoped to the teams and projects the
        authenticated user belongs to (admins see everything).
      parameters:
        - name: team_id
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: project_id
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: causer_id
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: action
          in: query
          required: false
          schema:
            type: string
        - $ref: '#/components/parameters/PerPage'
      responses:
        '200':
          description: Paginated collection of activity log entries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityLogCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /dashboard:
    get:
      tags: [ Dashboard ]
      summary: Get the authenticated user dashboard
      description: >
        Returns the authenticated user's task counts by status, upcoming tasks
        (next 7 days), overdue task count and recent activity.
      responses:
        '200':
          description: Dashboard payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /search:
    get:
      tags: [ Search ]
      summary: Search across projects, tasks and comments
      parameters:
        - name: q
          in: query
          required: true
          description: Search term, 2 to 255 characters.
          schema:
            type: string
            minLength: 2
            maxLength: 255
      responses:
        '200':
          description: Grouped search results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: "Send the API token as Authorization: Bearer <token>."
  parameters:
    PerPage:
      name: per_page
      in: query
      required: false
      description: Page size, clamped between 1 and 100. Defaults to 20.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    UserId:
      name: user
      in: path
      required: true
      description: The user identifier.
      schema:
        type: integer
        format: int64
    TeamId:
      name: team
      in: path
      required: true
      description: The team identifier.
      schema:
        type: integer
        format: int64
    ProjectId:
      name: project
      in: path
      required: true
      description: The project identifier.
      schema:
        type: integer
        format: int64
    TaskId:
      name: task
      in: path
      required: true
      description: The task identifier.
      schema:
        type: integer
        format: int64
    LabelId:
      name: label
      in: path
      required: true
      description: The label identifier.
      schema:
        type: integer
        format: int64
    CommentId:
      name: comment
      in: path
      required: true
      description: The comment identifier.
      schema:
        type: integer
        format: int64
    AttachmentId:
      name: attachment
      in: path
      required: true
      description: The attachment identifier.
      schema:
        type: integer
        format: int64
    NotificationId:
      name: notification
      in: path
      required: true
      description: The notification identifier.
      schema:
        type: integer
        format: int64
  responses:
    Unauthorized:
      description: Authentication is missing or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageResponse'
          example:
            message: Unauthenticated.
    Forbidden:
      description: The authenticated user is not authorized for this action.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageResponse'
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageResponse'
    ValidationError:
      description: The submitted data failed validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
  schemas:
    MessageResponse:
      type: object
      properties:
        message:
          type: string
    ValidationErrorResponse:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    PaginationLinks:
      type: object
      properties:
        first:
          type: string
          nullable: true
        last:
          type: string
          nullable: true
        prev:
          type: string
          nullable: true
        next:
          type: string
          nullable: true
    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
        from:
          type: integer
          nullable: true
        last_page:
          type: integer
        path:
          type: string
        per_page:
          type: integer
        to:
          type: integer
          nullable: true
        total:
          type: integer
    TaskStatus:
      type: string
      enum: [ todo, in_progress, in_review, done, cancelled ]
    TaskPriority:
      type: string
      enum: [ low, medium, high, urgent ]
    ProjectMemberRole:
      type: string
      enum: [ lead, contributor, viewer ]
    User:
      type: object
      description: A user. The email field is only present when the requester may see
        this address.
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [ admin, member ]
        avatar_url:
          type: string
          nullable: true
        timezone:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
      required: [ id, name, role ]
    UserEnvelope:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/User'
    AuthResponse:
      type: object
      description: Returned by register and login. The user is NOT wrapped in a data
        envelope here.
      properties:
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string
          description: API token to be presented as a bearer token on subsequent requests.
      required: [ user, token ]
    RegisterRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          minLength: 8
          maxLength: 255
      required: [ name, email, password ]
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
      required: [ email, password ]
    UpdateProfileRequest:
      type: object
      description: All fields optional; when present they must satisfy the listed
        constraints.
      properties:
        name:
          type: string
          maxLength: 255
        avatar_url:
          type: string
          maxLength: 2048
          nullable: true
        timezone:
          type: string
          maxLength: 64
    ChangePasswordRequest:
      type: object
      properties:
        current_password:
          type: string
        new_password:
          type: string
          minLength: 8
          maxLength: 255
      required: [ current_password, new_password ]
    Project:
      type: object
      properties:
        id:
          type: integer
          format: int64
        team_id:
          type: integer
          format: int64
        name:
          type: string
        key:
          type: string
          description: Uppercase alphanumeric project key, unique within the team.
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [ active, archived ]
        color:
          type: string
          nullable: true
        created_by:
          type: integer
          format: int64
          nullable: true
        team:
          $ref: '#/components/schemas/TeamSummary'
        creator:
          $ref: '#/components/schemas/User'
        members_count:
          type: integer
          description: Present when the members relationship count is loaded.
        tasks_count:
          type: integer
          description: Present when the tasks relationship count is loaded.
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
      required: [ id, team_id, name, key, status ]
    TeamSummary:
      type: object
      description: Minimal team representation embedded in a project.
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        slug:
          type: string
    ProjectEnvelope:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Project'
    ProjectCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Project'
        links:
          $ref: '#/components/schemas/PaginationLinks'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    ProjectStats:
      type: object
      properties:
        tasks_total:
          type: integer
        tasks_by_status:
          type: object
          additionalProperties:
            type: integer
        tasks_by_priority:
          type: object
          additionalProperties:
            type: integer
        overdue:
          type: integer
        completed:
          type: integer
        completion_pct:
          type: number
          format: float
        members:
          type: integer
    ProjectStatsEnvelope:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/ProjectStats'
    StoreProjectRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        key:
          type: string
          maxLength: 16
          pattern: '^[A-Z0-9]+$'
          description: Uppercase alphanumeric; must be unique within the team.
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [ active, archived ]
        color:
          type: string
          maxLength: 32
          nullable: true
      required: [ name, key ]
    UpdateProjectRequest:
      type: object
      description: All fields optional; when present they must satisfy the listed
        constraints.
      properties:
        name:
          type: string
          maxLength: 255
        key:
          type: string
          maxLength: 16
          pattern: '^[A-Z0-9]+$'
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [ active, archived ]
        color:
          type: string
          maxLength: 32
          nullable: true
    ProjectMember:
      type: object
      properties:
        id:
          type: integer
          format: int64
          nullable: true
        project_id:
          type: integer
          format: int64
          nullable: true
        user_id:
          type: integer
          format: int64
          nullable: true
        role:
          $ref: '#/components/schemas/ProjectMemberRole'
        user:
          $ref: '#/components/schemas/User'
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
    ProjectMemberEnvelope:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/ProjectMember'
    ProjectMemberCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ProjectMember'
    StoreProjectMemberRequest:
      type: object
      properties:
        user_id:
          type: integer
          format: int64
        role:
          $ref: '#/components/schemas/ProjectMemberRole'
      required: [ user_id, role ]
    UpdateProjectMemberRequest:
      type: object
      properties:
        role:
          $ref: '#/components/schemas/ProjectMemberRole'
      required: [ role ]
    Label:
      type: object
      properties:
        id:
          type: integer
          format: int64
        project_id:
          type: integer
          format: int64
        name:
          type: string
        color:
          type: string
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
      required: [ id, project_id, name, color ]
    LabelEnvelope:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Label'
    LabelCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Label'
    StoreLabelRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 64
          description: Must be unique within the project.
        color:
          type: string
          maxLength: 32
          pattern: '^#?[0-9a-fA-F]{3,8}$'
      required: [ name, color ]
    UpdateLabelRequest:
      type: object
      description: All fields optional; when present they must satisfy the listed
        constraints.
      properties:
        name:
          type: string
          maxLength: 64
        color:
          type: string
          maxLength: 32
          pattern: '^#?[0-9a-fA-F]{3,8}$'
    Task:
      type: object
      description: Full task representation (includes description).
      properties:
        id:
          type: integer
          format: int64
        project_id:
          type: integer
          format: int64
        parent_id:
          type: integer
          format: int64
          nullable: true
        title:
          type: string
        description:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/TaskStatus'
        priority:
          $ref: '#/components/schemas/TaskPriority'
        assignee_id:
          type: integer
          format: int64
          nullable: true
        reporter_id:
          type: integer
          format: int64
          nullable: true
        assignee:
          $ref: '#/components/schemas/User'
        reporter:
          $ref: '#/components/schemas/User'
        labels:
          type: array
          items:
            $ref: '#/components/schemas/Label'
        due_date:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        position:
          type: integer
        is_overdue:
          type: boolean
        comments_count:
          type: integer
          description: Present when the comments relationship count is loaded.
        attachments_count:
          type: integer
          description: Present when the attachments relationship count is loaded.
        subtasks_count:
          type: integer
          description: Present when the children relationship count is loaded.
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
      required: [ id, project_id, title, status, priority ]
    TaskListItem:
      type: object
      description: Lighter task representation used in collections (omits description).
      properties:
        id:
          type: integer
          format: int64
        project_id:
          type: integer
          format: int64
        parent_id:
          type: integer
          format: int64
          nullable: true
        title:
          type: string
        status:
          $ref: '#/components/schemas/TaskStatus'
        priority:
          $ref: '#/components/schemas/TaskPriority'
        assignee_id:
          type: integer
          format: int64
          nullable: true
        reporter_id:
          type: integer
          format: int64
          nullable: true
        assignee:
          $ref: '#/components/schemas/User'
        reporter:
          $ref: '#/components/schemas/User'
        labels:
          type: array
          items:
            $ref: '#/components/schemas/Label'
        due_date:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        position:
          type: integer
        is_overdue:
          type: boolean
        comments_count:
          type: integer
        attachments_count:
          type: integer
        subtasks_count:
          type: integer
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
      required: [ id, project_id, title, status, priority ]
    TaskEnvelope:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Task'
    TaskListCollection:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TaskListItem'
        links:
          $ref: '#/components/schemas/PaginationLinks'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    TaskListCollectionSimple:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TaskListItem'
    StoreTaskRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/TaskStatus'
        priority:
          $ref: '#/components/schemas/TaskPriority'
        assignee_id:
          type: integer
          format: int64
          nullable: true
        parent_id:
          type: integer
          format: int64
          nullable: true
        due_date:
          type: string
          format: date
          nullable: true
        position:
          type: integer
          minimum: 0
        label_ids:
          type: array
          items:
            type: integer
            format: int64
      required: [ title ]
    UpdateTaskRequest:
      type: object
      description: All fields optional; when present they must satisfy the listed
        constraints.
      properties:
        title:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/TaskStatus'
        priority:
          $ref: '#/components/schemas/TaskPriority'
        assignee_id:
          type: integer
          format: int64
          nullable: true
        parent_id:
          type: integer
          format: int64
