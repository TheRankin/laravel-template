services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    expose:
      - "9000"
    command:
      - sh
      - -c
      - |
        chown -R www-data:www-data storage bootstrap/cache database
        exec php-fpm

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
